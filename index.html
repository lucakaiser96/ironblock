          {/* Körpergewicht Eingabe Modal */}
          {showBWInput && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full">
                <div className="text-center mb-5">
                  <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Körpergewicht</div>
                  <div className="font-display text-2xl text-gray-900 mt-1">Heute · {new Date().toLocaleDateString('de-DE', { day: 'numeric', month: 'long' })}</div>
                  {latestBW && <div className="text-sm text-gray-400 mt-1">Zuletzt: {latestBW.kg} kg</div>}
                </div>
                <div className="flex items-center gap-2 mb-5">
                  <button onClick={() => setBwInput(v => String(Math.max(0, (parseFloat(v.replace(',','.')) || 0) - 0.1).toFixed(1)))}
                    className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center text-gray-700 active:bg-gray-200 text-xl font-bold">−</button>
                  <input
                    type="number" inputMode="decimal" value={bwInput}
                    onChange={e => setBwInput(e.target.value)}
                    placeholder={latestBW ? String(latestBW.kg) : '80.0'}
                    className="flex-1 text-center font-mono-num text-4xl font-bold text-gray-900 bg-gray-50 border border-gray-200 rounded-2xl py-4 outline-none focus:border-emerald-400"
                    autoFocus
                  />
                  <button onClick={() => setBwInput(v => String(((parseFloat(v.replace(',','.')) || 0) + 0.1).toFixed(1)))}
                    className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center text-gray-700 active:bg-gray-200 text-xl font-bold">+</button>
                </div>
                <div className="text-center text-xs text-gray-400 mb-4">kg · 0.1er Schritte oder direkt eintippen</div>
                <div className="flex gap-2">
                  <button onClick={() => { setShowBWInput(false); setBwInput(''); }}
                    className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Abbrechen</button>
                  <button onClick={logBodyWeight} disabled={!bwInput}
                    className="flex-1 py-3 rounded-xl bg-emerald-500 disabled:bg-gray-200 text-white disabled:text-gray-400 font-bold">Speichern</button>
                </div>
              </div>
            </div>
          )}

          {/* Report Banner */}
          {(shouldShowReport || report) && (
            <div className="px-5 mt-4">
              <button onClick={() => shouldShowReport ? generateReport(shouldShowReport) : setReportOpen(true)}
                className="w-full rounded-2xl bg-gradient-to-r from-violet-50 to-indigo-50 border border-violet-200 p-4 flex items-center gap-3 active:scale-[0.99] transition">
                <div className="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center flex-shrink-0 text-xl">
                  {shouldShowReport === 'monthly' || report?.type === 'monthly' ? '📅' : '📊'}
                </div>
                <div className="flex-1 text-left">
                  <div className="font-semibold text-violet-900 text-sm">
                    {shouldShowReport === 'monthly' ? 'Monatsreport verfügbar' : shouldShowReport === 'weekly' ? 'Wochenreport verfügbar' : report?.type === 'monthly' ? 'Monatsreport' : 'Wochenreport'}
                  </div>
                  <div className="text-xs text-violet-600 mt-0.5">
                    {report?.generatedAt ? `Erstellt ${formatDateLong(report.generatedAt)}` : 'KI-Analyse deines Trainings'}
                  </div>
                </div>
                <Icon.ChevronRight size={16} className="text-violet-400" />
              </button>
            </div>
          )}

          {/* Report Modal */}
          {reportOpen && (
            <div className="fixed inset-0 z-50 flex flex-col bg-white" style={{ paddingTop: 'env(safe-area-inset-top)' }}>
              <div className="flex items-center gap-3 px-5 pt-5 pb-4 border-b border-gray-100">
                <button onClick={() => setReportOpen(false)} className="text-gray-400"><Icon.X size={22} /></button>
                <div>
                  <div className="text-xs uppercase tracking-wider text-gray-500">KI-Coach</div>
                  <div className="font-display text-2xl text-gray-900">{report?.type === 'monthly' ? 'MONATSREPORT' : 'WOCHENREPORT'}</div>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto px-5 py-4">
                {reportLoading ? (
                  <div className="flex flex-col items-center justify-center h-64 gap-4">
                    <div className="w-10 h-10 border-2 border-violet-300 border-t-violet-600 rounded-full animate-spin" />
                    <div className="text-sm text-gray-500">Coach analysiert dein Training…</div>
                  </div>
                ) : report?.text ? (
                  <div>
                    {report.text.split('\n').map((ln, i) => {
                      if (!ln.trim()) return <div key={i} className="h-3" />;
                      if (ln.match(/^\*\*.+\*\*$/) || ln.match(/^\d+\.\s\*\*/)) {
                        return <div key={i} className="font-bold text-violet-900 mt-4 mb-1">{ln.replace(/\*\*/g, '').replace(/^\d+\.\s/, '')}</div>;
                      }
                      if (ln.startsWith('- ') || ln.startsWith('• ')) {
                        return <div key={i} className="flex gap-2 text-sm text-gray-700 mb-1.5"><span className="text-violet-400 flex-shrink-0 mt-0.5">•</span><span>{ln.replace(/^[-•]\s/, '')}</span></div>;
                      }
                      return <div key={i} className="text-sm text-gray-700 mb-1 leading-relaxed">{ln}</div>;
                    })}
                  </div>
                ) : null}
              </div>
              <div className="px-5 pb-8 pt-3 border-t border-gray-100">
                <button onClick={() => generateReport(shouldShowReport || report?.type || 'weekly')}
                  className="w-full py-4 rounded-2xl bg-violet-600 text-white font-display text-xl active:scale-[0.98] transition">
                  {report ? 'NEU GENERIEREN' : 'REPORT GENERIEREN'}
                </button>
              </div>
            </div>
          )}

          {state.workouts.length > 0 && (
            <div className="px-5 mt-6">
              <div className="flex items-baseline justify-between mb-2 px-1">
                <div className="text-xs uppercase tracking-[0.25em] text-gray-500">Verlauf</div>
                <button onClick={() => setView('history')} className="text-xs text-emerald-700 flex items-center gap-1">
                  Alle ansehen <Icon.ArrowRight size={12} />
                </button>
              </div>
              <div className="space-y-2">
                {/* Merge workouts + activities, sort by date, show last 4 */}
                {[
                  ...state.workouts.map(w => ({ ...w, _type: 'workout' })),
                  ...(state.activities || []).map(a => ({ ...a, _type: 'activity' })),
                ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4).map((item) => {
                  if (item._type === 'workout') {
                    const w = item;
                    return (
                      <div key={w.id} className="rounded-2xl bg-gray-50 border border-gray-200 p-4 flex items-center gap-3">
                        <div className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center font-display text-2xl text-emerald-700">{w.templateCode}</div>
                        <div className="flex-1 min-w-0">
                          <div className="font-semibold text-gray-900">{w.templateName}</div>
                          <div className="text-xs text-gray-500 mt-0.5">{formatDateLong(w.date)} · {w.durationMin}min · {w.totalVolume}kg</div>
                          {w.note && <div className="text-xs text-amber-700 mt-0.5 truncate">📝 {w.note}</div>}
                        </div>
                        <div className="font-mono-num text-sm text-emerald-700">+{w.xpEarned}</div>
                      </div>
                    );
                  } else {
                    const a = item;
                    const isRun = a.activityType === 'jogging';
                    const fmtDur = m => m >= 60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m}min`;
                    const pace = (isRun && a.km && a.durationMin)
                      ? (() => { const s = (a.durationMin*60)/a.km; return `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}/km`; })()
                      : null;
                    return (
                      <div key={a.id} className={`rounded-2xl p-4 flex items-center gap-3 border ${isRun ? 'bg-orange-50 border-orange-200' : 'bg-lime-50 border-lime-200'}`}>
                        <div className={`w-12 h-12 rounded-xl bg-white/70 flex items-center justify-center flex-shrink-0 ${isRun ? 'text-orange-600' : 'text-lime-700'}`}>
                          {isRun ? <Icon.Footprints size={22} strokeWidth={1.8} /> : <Icon.Tennis size={22} strokeWidth={1.8} />}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className={`font-semibold ${isRun ? 'text-orange-700' : 'text-lime-800'}`}>{isRun ? 'Joggen' : 'Tennis'}</div>
                          <div className="text-xs text-gray-500 mt-0.5">
                            {formatDateLong(a.date)} · {fmtDur(a.durationMin)}
                            {a.km ? ` · ${a.km} km` : ''}
                            {pace ? ` · ${pace}` : ''}
                          </div>
                          {a.note && <div className="text-xs text-amber-700 mt-0.5 truncate">📝 {a.note}</div>}
                        </div>
                      </div>
                    );
                  }
                })}
              </div>
            </div>
          )}

          <BottomNav active="dashboard" setView={setView} hasHistory={state.workouts.length > 0} />
        </div>
      );
    };

    // ========================================================================
    // ACTIVE WORKOUT
    // ========================================================================
    const NumberStepper = ({ label, unit, value, setValue, step, min = 0, max = Infinity }) => (
      <div className="rounded-2xl bg-white border border-gray-200 p-2">
        <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">{label}</div>
        <div className="flex items-center justify-between gap-1">
          <button onClick={() => setValue(Math.max(min, +(value - step).toFixed(2)))} className="w-11 h-11 rounded-xl bg-gray-100 active:bg-zinc-700 text-gray-800 flex items-center justify-center">
            <Icon.Minus size={18} strokeWidth={3} />
          </button>
          <div className="flex-1 text-center">
            <span className="font-display text-4xl text-gray-900 font-mono-num">{value}</span>
            {unit && <span className="text-gray-500 text-sm ml-1">{unit}</span>}
          </div>
          <button onClick={() => setValue(Math.min(max, +(value + step).toFixed(2)))} className="w-11 h-11 rounded-xl bg-gray-100 active:bg-zinc-700 text-gray-800 flex items-center justify-center">
            <Icon.Plus size={18} strokeWidth={3} />
          </button>
        </div>
      </div>
    );

    const ActiveWorkoutView = ({ state, persist }) => {
      const aw = state.activeWorkout;
      const [exIndex, setExIndex] = useState(aw.currentExerciseIndex || 0);
      const [weight, setWeight] = useState(0);
      const [reps, setReps] = useState(0);
      const [now, setNow] = useState(Date.now());
      const [confirmAbort, setConfirmAbort] = useState(false);
      const [editingName, setEditingName] = useState(false);
      const [nameDraft, setNameDraft] = useState('');
      const [editingSet, setEditingSet] = useState(null);
      const [editSetWeight, setEditSetWeight] = useState(0);
      const [editSetReps, setEditSetReps] = useState(0);
      const [editSetMeters, setEditSetMeters] = useState(0);
      const [showSwap, setShowSwap] = useState(false);
      const [swapFilter, setSwapFilter] = useState('Alle');
      const [swapSearch, setSwapSearch] = useState('');
      const [workoutNote, setWorkoutNote] = useState(aw.note || '');
      const [rowingMinutes, setRowingMinutes] = useState(10);
      const [rowingLevel, setRowingLevel] = useState(5);
      const [rowingMeters, setRowingMeters] = useState(2000);

      const currentExercise = aw.exercises[exIndex];
      const isCardio = currentExercise.cardio === true;

      const lastRecord = state.exerciseRecords[currentExercise.name];
      const setNumber = currentExercise.completedSets.length;
      const isDone = setNumber >= currentExercise.sets;
      const suggestion = useMemo(() => suggestNextSet(currentExercise, lastRecord, state.deloadMode), [currentExercise.name, lastRecord, state.deloadMode]);

      // Bar weight that gets added to inputs when 'useBarbell' is on
      // Scheiben sind auf BEIDEN Seiten, also: (Eingabe × 2) + Stange
      const barAdj = currentExercise.useBarbell ? ((weight * 2) + (currentExercise.barWeight || 20)) - weight : 0;

      useEffect(() => {
        if (isCardio) {
          const last = currentExercise.completedSets[currentExercise.completedSets.length - 1];
          if (last) {
            setRowingMinutes(last.reps || 10);
            setRowingLevel(last.weight || 5);
            setRowingMeters(last.meters || 2000);
          } else if (lastRecord) {
            setRowingMinutes(lastRecord.topReps || 10);
            setRowingLevel(lastRecord.weight || 5);
            setRowingMeters(2000);
          } else {
            setRowingMinutes(10);
            setRowingLevel(5);
            setRowingMeters(2000);
          }
          return;
        }
        const last = currentExercise.completedSets[currentExercise.completedSets.length - 1];
        if (currentExercise.bodyweight) {
          setWeight(0);
          setReps(last ? last.reps : suggestion.reps);
        } else if (last) {
          setWeight(Math.max(0, last.weight - barAdj));
          setReps(last.reps);
        } else {
          setWeight(Math.max(0, (suggestion.weight || 0) - barAdj));
          setReps(suggestion.reps);
        }
      }, [exIndex, currentExercise.name, currentExercise.completedSets.length]);

      useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(t);
      }, []);

      const elapsedMin = Math.floor((now - new Date(aw.startedAt).getTime()) / 60000);
      const totalSetsDone = aw.exercises.reduce((s, e) => s + e.completedSets.length, 0);
      const totalSetsPlanned = aw.exercises.reduce((s, e) => s + e.sets, 0);
      const totalVolume = aw.exercises.reduce((sum, e) => sum + e.completedSets.reduce((s, set) => s + (set.weight || 0) * set.reps, 0), 0);
      const restRemaining = aw.restEndsAt ? Math.max(0, Math.ceil((new Date(aw.restEndsAt).getTime() - now) / 1000)) : 0;
      const isResting = restRemaining > 0;
      const allExercisesDone = aw.exercises.every((e) => e.completedSets.length >= e.sets || e.skipped);
      const timeOverBudget = elapsedMin > 60;

      const updateActive = (nextAw) => persist({ ...state, activeWorkout: nextAw });

      const toggleBarbell = () => {
        const newExercises = [...aw.exercises];
        newExercises[exIndex] = { ...currentExercise, useBarbell: !currentExercise.useBarbell };
        // Keep the displayed input value INVARIANT when toggling — its
        // interpretation changes (plates ↔ total), the number stays put.
        updateActive({ ...aw, exercises: newExercises });
      };

      const logSet = () => {
        let newSet;
        if (isCardio) {
          newSet = { weight: rowingLevel, reps: rowingMinutes, meters: rowingMeters, warmup: false, completedAt: new Date().toISOString() };
        } else {
          const storedWeight = weight + barAdj;
          newSet = { weight: storedWeight, reps, warmup: isWarmup, completedAt: new Date().toISOString() };
        }
        const newExercises = [...aw.exercises];
        newExercises[exIndex] = { ...currentExercise, completedSets: [...currentExercise.completedSets, newSet] };
        const restSeconds = currentExercise.restSeconds || state.profile.restSeconds;
        const restEndsAt = new Date(now + restSeconds * 1000).toISOString();
        if (navigator.vibrate) navigator.vibrate(20);
        // SW notification for rest timer (fires even when screen locks)
        if (typeof window.IronblockNotif !== 'undefined' && Notification.permission === 'granted') {
          navigator.serviceWorker?.ready.then(() => {
            window.IronblockNotif.scheduleRest(restSeconds);
          });
        }
        setIsWarmup(false);
        updateActive({ ...aw, exercises: newExercises, restEndsAt });
      };

      const skipRest = () => {
        if (typeof window.IronblockNotif !== 'undefined') window.IronblockNotif.cancelRest();
        updateActive({ ...aw, restEndsAt: null });
      };

      const skipExercise = () => {
        const newExercises = [...aw.exercises];
        newExercises[exIndex] = { ...currentExercise, skipped: true };
        const nextUndone = newExercises.findIndex((e, i) => i > exIndex && !e.skipped && e.completedSets.length < e.sets);
        const nextIdx = nextUndone !== -1 ? nextUndone : exIndex;
        setExIndex(nextIdx);
        updateActive({ ...aw, exercises: newExercises, currentExerciseIndex: nextIdx, restEndsAt: null });
      };

      const swapExercise = (libEx) => {
        const newEx = {
          name: libEx.name,
          sets: currentExercise.sets,
          repRange: libEx.repRange,
          focus: libEx.focus,
          bodyweight: libEx.bodyweight || false,
          cardio: libEx.cardio || false,
          completedSets: [],
          skipped: false,
          useBarbell: libEx.barbell || detectsBarbell(libEx.name),
          barWeight: 20,
          restSeconds: libEx.restSeconds || currentExercise.restSeconds,
        };
        const newExercises = [...aw.exercises];
        newExercises[exIndex] = newEx;
        updateActive({ ...aw, exercises: newExercises, restEndsAt: null });
        setShowSwap(false);
      };

      const [showAddExercise, setShowAddExercise] = useState(false);
      const [addFilter, setAddFilter] = useState('Alle');
      const [addSearch, setAddSearch] = useState('');
      const [isWarmup, setIsWarmup] = useState(false);

      const addExercise = (libEx) => {
        const newEx = {
          name: libEx.name,
          sets: libEx.sets || 3,
          repRange: libEx.repRange,
          focus: libEx.focus,
          bodyweight: libEx.bodyweight || false,
          cardio: libEx.cardio || false,
          completedSets: [],
          skipped: false,
          useBarbell: libEx.barbell || detectsBarbell(libEx.name),
          barWeight: 20,
          restSeconds: libEx.restSeconds,
        };
        const newExercises = [...aw.exercises, newEx];
        updateActive({ ...aw, exercises: newExercises });
        setShowAddExercise(false);
        // Jump to the new exercise
        setExIndex(newExercises.length - 1);
      };

      const openSetEditor = (exIdx, setIdx) => {
        const s = aw.exercises[exIdx].completedSets[setIdx];
        setEditingSet({ exIdx, setIdx, weight: s.weight, reps: s.reps, warmup: s.warmup, meters: s.meters || 0 });
        setEditSetWeight(s.weight);
        setEditSetReps(s.reps);
        setEditSetMeters(s.meters || 0);
      };

      const saveSetEdit = () => {
        if (!editingSet || editSetReps === 0) return;
        const newExercises = [...aw.exercises];
        const newSets = [...newExercises[editingSet.exIdx].completedSets];
        const isCardioSet = newSets[editingSet.setIdx].meters != null;
        newSets[editingSet.setIdx] = { 
          weight: editSetWeight, 
          reps: editSetReps, 
          warmup: editingSet.warmup, 
          completedAt: newSets[editingSet.setIdx].completedAt,
          meters: isCardioSet ? editSetMeters : undefined
        };
        newExercises[editingSet.exIdx] = { ...newExercises[editingSet.exIdx], completedSets: newSets };
        updateActive({ ...aw, exercises: newExercises });
        setEditingSet(null);
      };

      const goToExercise = (i) => {
        setExIndex(i);
        updateActive({ ...aw, currentExerciseIndex: i, restEndsAt: null });
      };

      const openNameEditor = () => {
        setNameDraft(currentExercise.name);
        setEditingName(true);
      };

      const saveExerciseName = () => {
        const trimmed = nameDraft.trim();
        if (!trimmed || trimmed === currentExercise.name) {
          setEditingName(false);
          return;
        }
        const newExercises = [...aw.exercises];
        newExercises[exIndex] = { ...currentExercise, name: trimmed };
        updateActive({ ...aw, exercises: newExercises });
        setEditingName(false);
      };

      const finishWorkout = (aborted = false) => {
        const now2 = new Date();
        const durationMin = Math.max(1, Math.floor((now2 - new Date(aw.startedAt)) / 60000));
        const completedExercises = aw.exercises.filter((e) => e.completedSets.length > 0);
        if (completedExercises.length === 0) { persist({ ...state, activeWorkout: null }); return; }
        const workSets = (sets) => sets.filter(s => !s.warmup);
        const volume = aw.exercises.reduce((sum, e) => sum + workSets(e.completedSets).reduce((s, set) => s + (set.weight || 0) * set.reps, 0), 0);
        const setsDone = aw.exercises.reduce((s, e) => s + workSets(e.completedSets).length, 0);
        const isVacation = state.vacationUntil && new Date(state.vacationUntil) >= now2;
        const isDeload = state.deloadMode;
        let xpEarned = (aborted ? 50 : 100) + setsDone * 5 + Math.floor(volume / 100);
        if (isDeload) xpEarned = Math.floor(xpEarned / 2);

        const newRecords = { ...state.exerciseRecords };
        aw.exercises.forEach((ex) => {
          if (ex.completedSets.length === 0) return;
          const ws = workSets(ex.completedSets);
          if (ws.length === 0) return;
          const topSet = ws.reduce((b, s) => (s.reps > b.reps ? s : b), ws[0]);
          newRecords[ex.name] = { weight: topSet.weight, topReps: topSet.reps, date: now2.toISOString(), weightUp: ex.weightUp };
        });

        const workout = {
          id: 'w_' + Date.now(), date: now2.toISOString(),
          templateKey: aw.templateKey, templateName: aw.templateName, templateCode: aw.templateCode,
          durationMin, totalVolume: Math.round(volume), setsCompleted: setsDone, setsPlanned: totalSetsPlanned, xpEarned, aborted, deload: isDeload,
          note: (aw.note || '').trim() || null,
          exercises: aw.exercises.map((e) => ({ name: e.name, repRange: e.repRange, completedSets: e.completedSets })),
        };

        const planDef = resolvePlan(state.profile.plan, state.userPlans);
        const currentWeek = getWeekStart(now2);
        let weekStart = state.stats.weekStart || currentWeek;
        let sessionsThisWeek = state.stats.sessionsThisWeek;
        let streak = state.stats.streak;
        if (!isVacation) {
          if (weekStart !== currentWeek) {
            if (sessionsThisWeek >= planDef.daysPerWeek) streak = (streak || 0) + 1;
            else streak = 0;
            weekStart = currentWeek; sessionsThisWeek = 0;
          }
          sessionsThisWeek += 1;
          if (sessionsThisWeek === planDef.daysPerWeek) streak = (streak || 0) + 1;
        }

        // Remember each exercise's barbell toggle for next time.
        const newBarbellPrefs = { ...(state.barbellPrefs || {}) };
        aw.exercises.forEach((ex) => {
          if (typeof ex.useBarbell === 'boolean') newBarbellPrefs[ex.name] = ex.useBarbell;
        });

        persist({
          ...state, activeWorkout: null, exerciseRecords: newRecords, postWorkout: workout,
          workouts: [...state.workouts, workout],
          barbellPrefs: newBarbellPrefs,
          stats: { ...state.stats, totalXP: state.stats.totalXP + xpEarned, totalVolume: state.stats.totalVolume + volume,
                   lastWorkoutDate: now2.toISOString(), sessionsThisWeek, weekStart, streak,
                   bestStreak: Math.max(state.stats.bestStreak || 0, streak) },
        });
      };

      return (
        <div className="min-h-screen pb-32 relative grain">
          <div className="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-gray-200" style={{ paddingTop: 'env(safe-area-inset-top)' }}>
            <div className="px-4 py-3 flex items-center justify-between">
              <button onClick={() => setConfirmAbort(true)} className="text-gray-500 hover:text-gray-800 p-1">
                <Icon.X size={22} />
              </button>
              <div className="flex items-center gap-2 text-sm">
                <Icon.Clock size={14} className={timeOverBudget ? 'text-red-400' : 'text-gray-600'} />
                <span className={`font-mono-num ${timeOverBudget ? 'text-red-400 font-bold' : 'text-gray-700'}`}>{elapsedMin} / 60 min</span>
              </div>
              <button onClick={() => finishWorkout(false)}
                className="px-3 py-1.5 rounded-xl bg-emerald-100 text-emerald-800 text-xs font-bold active:bg-emerald-200 transition">
                BEENDEN
              </button>
            </div>
            <div className="h-1 bg-gray-50">
              <div className={`h-full transition-all duration-1000 ${timeOverBudget ? 'bg-red-500' : 'bg-emerald-100'}`} style={{ width: `${Math.min(100, (elapsedMin / 60) * 100)}%` }} />
            </div>
          </div>

          <div className="px-4 pt-4">
            <div className="flex gap-1 overflow-x-auto pb-2 -mx-1 px-1">
              {aw.exercises.map((ex, i) => {
                const done = ex.completedSets.length >= ex.sets;
                const active = i === exIndex;
                const partial = ex.completedSets.length > 0 && !done;
                const skipped = ex.skipped && !done;
                return (
                  <button key={i} onClick={() => goToExercise(i)}
                    className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap transition ${
                      active   ? 'bg-emerald-100 border-emerald-400 text-emerald-900'
                      : done   ? 'bg-gray-50 border-gray-300 text-gray-600 line-through'
                      : skipped? 'bg-amber-50 border-amber-300 text-amber-600'
                      : partial ? 'bg-gray-50 border-emerald-300 text-gray-800'
                      : 'bg-gray-50 border-gray-200 text-gray-500'
                    }`}>
                    {i + 1}. {ex.name.split(' ')[0]}{skipped ? ' ↷' : ''}
                  </button>
                );
              })}
            </div>
          </div>

          <div className="px-4 mt-3">
            <div className="text-xs uppercase tracking-[0.25em] text-gray-500">{aw.templateName} · Übung {exIndex + 1} von {aw.exercises.length}</div>
            <div className="mt-2 flex items-start justify-between gap-2">
              <button onClick={openNameEditor} className="flex-1 text-left flex items-start gap-2 group active:opacity-70">
                <h1 className="font-display text-5xl text-gray-900 leading-none">{currentExercise.name.toUpperCase()}</h1>
                <Icon.Edit3 size={16} className="text-gray-400 mt-1 flex-shrink-0" strokeWidth={2.5} />
              </button>
              {setNumber === 0 && (
                <button onClick={() => { setSwapFilter('Alle'); setSwapSearch(''); setShowSwap(true); }}
                  className="flex-shrink-0 flex items-center gap-1.5 px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-medium active:bg-emerald-100 transition mt-1">
                  <Icon.Shuffle size={14} strokeWidth={2.5} />
                  Wechseln
                </button>
              )}
            </div>
            <div className="text-sm text-gray-600 mt-1">{currentExercise.focus} · {isCardio ? `${currentExercise.repRange[0]}–${currentExercise.repRange[1]} min` : `${currentExercise.sets} × ${currentExercise.repRange[0]}–${currentExercise.repRange[1]} Wdh.`}</div>
            <button onClick={toggleBarbell}
              className={`mt-3 inline-flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-medium transition ${
                currentExercise.useBarbell
                  ? 'bg-emerald-50 border-emerald-300 text-emerald-700'
                  : 'bg-gray-50 border-gray-200 text-gray-500'
              }`}>
              <div className={`w-4 h-4 rounded border-[1.5px] flex items-center justify-center transition ${
                currentExercise.useBarbell ? 'bg-emerald-100 border-emerald-400' : 'border-gray-400'
              }`}>
                {currentExercise.useBarbell && <Icon.Check size={10} strokeWidth={4} className="text-emerald-900" />}
              </div>
              <span>Langhantelstange</span>
              <span className="font-mono-num opacity-70">+{currentExercise.barWeight || 20} kg</span>
            </button>
          </div>

          <div className="px-4 mt-4 flex gap-2">
            {Array.from({ length: currentExercise.sets }).map((_, i) => {
              const s = currentExercise.completedSets[i];
              const isCurrent = i === setNumber && !isDone;
              return (
                <button key={i} onClick={() => s && openSetEditor(exIndex, i)} className={`flex-1 h-14 rounded-xl border flex flex-col items-center justify-center transition active:scale-95 ${
                  s ? (s.warmup ? 'bg-gray-100 border-gray-300 text-gray-500 cursor-pointer hover:bg-gray-200' : 'bg-emerald-50 border-emerald-300 text-emerald-700 cursor-pointer hover:bg-emerald-100')
                  : isCurrent ? 'bg-gray-50 border-emerald-400 text-gray-900'
                  : 'bg-gray-50 border-gray-200 text-gray-400'
                }`}>
                  <div className="text-[10px] uppercase tracking-wider opacity-70">{isCardio ? 'Einheit' : 'Satz'} {i + 1}</div>
                  {s ? <div className="font-mono-num text-sm font-bold">
                    {s.warmup && <span className="text-[9px] font-normal mr-1">WU</span>}
                    {isCardio
                      ? `${s.reps}min${currentExercise.name === 'Rudermaschine' ? ' · St.' + s.weight : ''} · ${s.meters}m`
                      : currentExercise.bodyweight ? `${s.reps}×` : `${s.weight}×${s.reps}`}
                  </div>
                     : isCurrent ? <div className="text-xs font-medium">aktiv</div>
                     : <div className="text-xs">—</div>}
                </button>
              );
            })}
          </div>

          {isResting ? (
            <div className="px-4 mt-5 slide-up">
              <div className="rounded-3xl bg-gray-50 border border-gray-200 p-6 text-center">
                <div className="text-xs uppercase tracking-[0.3em] text-gray-500 mb-1">Pause</div>
                <div className="font-display text-7xl text-emerald-700 font-mono-num">{formatTime(restRemaining)}</div>
                <div className="text-xs text-gray-500 mt-1">{isCardio ? 'bis zur nächsten Einheit' : 'bis zum nächsten Satz'} · {currentExercise.restSeconds || state.profile.restSeconds}s</div>
                <div className="mt-4 flex gap-2">
                  <button onClick={() => updateActive({ ...aw, restEndsAt: new Date(now + (restRemaining + 15) * 1000).toISOString() })} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-800 text-sm font-medium flex items-center justify-center gap-1">
                    <Icon.Plus size={14} /> 15s
                  </button>
                  <button onClick={skipRest} className="flex-1 py-3 rounded-xl bg-emerald-100 text-emerald-900 text-sm font-bold flex items-center justify-center gap-1">
                    <Icon.SkipForward size={14} /> Überspringen
                  </button>
                </div>
              </div>
            </div>
          ) : isDone ? (
            <div className="px-4 mt-5">
              <div className="rounded-3xl bg-emerald-50 border border-emerald-200 p-6 text-center">
                <Icon.Check size={36} strokeWidth={3} className="text-emerald-700 mx-auto" />
                <div className="font-display text-3xl text-gray-900 mt-2">ÜBUNG ABGESCHLOSSEN</div>
                <div className="text-sm text-gray-600 mt-1">Alle {currentExercise.sets} Sätze geloggt</div>
                {exIndex < aw.exercises.length - 1 ? (
                  <button onClick={() => goToExercise(exIndex + 1)}
                    className="mt-4 w-full bg-emerald-100 text-emerald-900 rounded-2xl py-4 font-display text-xl active:scale-[0.98] transition flex items-center justify-center gap-2">
                    NÄCHSTE ÜBUNG <Icon.ArrowRight size={20} strokeWidth={3} />
                  </button>
                ) : allExercisesDone ? (
                  <button onClick={() => finishWorkout(false)}
                    className="mt-4 w-full bg-emerald-100 text-emerald-900 rounded-2xl py-4 font-display text-xl active:scale-[0.98] transition flex items-center justify-center gap-2">
                    TRAINING BEENDEN <Icon.Trophy size={20} strokeWidth={3} />
                  </button>
                ) : (
                  <div className="text-xs text-gray-500 mt-3">Wähle oben eine offene Übung</div>
                )}
              </div>
            </div>
          ) : (
            <>
              <div className="px-4 mt-4 grid grid-cols-2 gap-2">
                <div className="rounded-2xl bg-gray-50 border border-gray-200 p-3">
                  <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Letztes Mal</div>
                  {lastRecord ? (
                    <>
                      <div className="font-mono-num font-bold text-gray-900">
                        {isCardio
                          ? `${lastRecord.topReps} min${currentExercise.name === 'Rudergerät' || currentExercise.name === 'Rudermaschine' ? ' · Stufe ' + lastRecord.weight : ''}`
                          : currentExercise.bodyweight
                            ? `${lastRecord.topReps} Wdh.`
                            : `${lastRecord.weight}kg × ${lastRecord.topReps}`}
                      </div>
                      <div className="text-[10px] text-gray-500 mt-0.5">{formatDate(lastRecord.date)}</div>
                      {lastRecord.weightUp && (
                        <div className="mt-1.5 inline-flex items-center gap-1 text-[10px] font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2 py-0.5">
                          <Icon.TrendingUp size={10} strokeWidth={3} /> +2,5 kg wolltest du mehr
                        </div>
                      )}
                    </>
                  ) : <div className="text-xs text-gray-500">Neue Übung</div>}
                </div>
                {!isCardio && (
                  <div className="rounded-2xl bg-emerald-50 border border-emerald-300 p-3">
                    <div className="text-[10px] uppercase tracking-wider text-emerald-700 mb-1 flex items-center gap-1">
                      <Icon.TrendingUp size={10} strokeWidth={3} /> Vorschlag
                    </div>
                    <div className="font-mono-num font-bold text-emerald-700">
                      {currentExercise.bodyweight
                        ? `${suggestion.reps} Wdh.`
                        : `${suggestion.weight ?? 0}kg × ${suggestion.reps}`}
                    </div>
                    <div className="text-[10px] text-gray-600 mt-0.5 truncate">{suggestion.hint}</div>
                  </div>
                )}
                {isCardio && (
                  <div className="rounded-2xl bg-blue-50 border border-blue-200 p-3">
                    <div className="text-[10px] uppercase tracking-wider text-blue-700 mb-1">Pace</div>
                    <div className="font-mono-num font-bold text-blue-700 text-lg">{(rowingMeters / rowingMinutes).toFixed(0)}</div>
                    <div className="text-[10px] text-blue-600">m/min live</div>
                  </div>
                )}
              </div>

              {!isCardio && (
                <div className="px-4 mt-2">
                  <button
                    onClick={() => {
                      const newExercises = [...aw.exercises];
                      newExercises[exIndex] = { ...currentExercise, weightUp: !currentExercise.weightUp };
                      updateActive({ ...aw, exercises: newExercises });
                    }}
                    className={`w-full py-2.5 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition ${
                      currentExercise.weightUp
                        ? 'bg-amber-100 text-amber-800 border border-amber-300'
                        : 'bg-gray-100 text-gray-500 border border-gray-200'
                    }`}
                  >
                    <Icon.TrendingUp size={16} strokeWidth={2.5} />
                    {currentExercise.weightUp ? '🔼 +2,5 kg beim nächsten Mal' : 'Gewicht erhöhen merken'}
                  </button>
                </div>
              )}

              <div className="px-4 mt-4">
                <div className="rounded-3xl bg-gray-50 border border-gray-200 p-5">
                  {isCardio ? (
                    <>
                      <div className="text-xs uppercase tracking-wider text-gray-500 text-center mb-4">{currentExercise.name} · Einheit {setNumber + 1}</div>
                      <div className={`grid gap-3 ${currentExercise.name === 'Rudergerät' || currentExercise.name === 'Rudermaschine' ? 'grid-cols-3' : 'grid-cols-2'}`}>
                        <NumberStepper label="Minuten" unit="min" value={rowingMinutes} setValue={setRowingMinutes} step={1} min={1} />
                        {(currentExercise.name === 'Rudergerät' || currentExercise.name === 'Rudermaschine') && (
                          <NumberStepper label="Stufe" unit="" value={rowingLevel} setValue={setRowingLevel} step={1} min={1} />
                        )}
                        <NumberStepper label="Meter" unit="m" value={rowingMeters} setValue={setRowingMeters} step={100} min={100} />
                      </div>
                      <div className="mt-3 text-center text-[11px] text-gray-500">
                        <span className="font-mono-num font-bold text-gray-700">{(rowingMeters / rowingMinutes).toFixed(0)} m/min</span>
                        <span className="text-gray-400"> · Pace</span>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="text-xs uppercase tracking-wider text-gray-500 text-center mb-4">{isCardio ? 'Einheit' : 'Satz'} {setNumber + 1} von {currentExercise.sets}</div>
                      {currentExercise.bodyweight ? (
                        <div className="max-w-[160px] mx-auto">
                          <NumberStepper label="Wdh." unit="" value={reps} setValue={setReps} step={1} min={0} />
                        </div>
                      ) : (
                        <div className="grid grid-cols-2 gap-3">
                          <NumberStepper label={currentExercise.useBarbell ? 'Scheiben' : 'Gewicht'} unit="kg" value={weight} setValue={setWeight} step={2.5} min={0} />
                          <NumberStepper label="Wdh." unit="" value={reps} setValue={setReps} step={1} min={0} />
                        </div>
                      )}
                      {!currentExercise.bodyweight && currentExercise.useBarbell && (
                        <div className="mt-3 text-center text-[11px] text-gray-600">
                          Tatsächlich: <span className="font-mono-num font-bold text-emerald-700">{weight + barAdj} kg</span>
                          <span className="text-gray-400"> · {weight} kg Scheiben + {barAdj} kg Stange</span>
                        </div>
                      )}
                    </>
                  )}
                  {!isCardio && (
                    <button onClick={() => setIsWarmup(!isWarmup)} className={`mt-3 w-full py-2.5 rounded-xl border text-sm font-medium flex items-center justify-center gap-2 transition ${isWarmup ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                      <div className={`w-4 h-4 rounded border flex items-center justify-center transition ${isWarmup ? 'bg-amber-400 border-amber-400' : 'border-gray-400'}`}>
                        {isWarmup && <Icon.Check size={10} strokeWidth={3} className="text-white" />}
                      </div>
                      {isWarmup ? 'Warm-up Satz' : 'Als Warm-up Satz loggen'}
                    </button>
                  )}
                  <button onClick={logSet} disabled={!isCardio && reps === 0}
                    className="mt-4 w-full bg-emerald-100 disabled:bg-gray-100 disabled:text-gray-400 text-emerald-900 rounded-2xl py-5 font-display text-2xl active:scale-[0.98] transition flex items-center justify-center gap-2">
                    <Icon.Check size={22} strokeWidth={3} />
                    {isCardio ? 'EINHEIT LOGGEN' : 'SATZ LOGGEN'}
                  </button>
                  {!isCardio && setNumber > 0 && (() => {
                    const last = currentExercise.completedSets[setNumber - 1];
                    return (
                      <button onClick={() => {
                        if (currentExercise.useBarbell) {
                          setWeight(Math.max(0, (last.weight - (currentExercise.barWeight || 20)) / 2));
                        } else {
                          setWeight(last.weight);
                        }
                        setReps(last.reps);
                        setIsWarmup(last.warmup || false);
                      }}
                        className="mt-2 w-full py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-gray-600 text-xs font-medium flex items-center justify-center gap-1.5 active:bg-gray-100 transition">
                        <Icon.RotateCcw size={13} strokeWidth={2.5} />
                        Letzten Satz wiederholen
                        <span className="font-mono-num text-gray-400 ml-1">
                          {last.weight === 0 ? `${last.reps}×` : `${last.weight}kg × ${last.reps}`}
                        </span>
                      </button>
                    );
                  })()}
                  {setNumber === 0 && (
                    <button onClick={skipExercise}
                      className="mt-2 w-full py-3 rounded-xl text-amber-600 bg-amber-50 border border-amber-200 text-sm font-medium flex items-center justify-center gap-1.5 active:bg-amber-100 transition">
                      <Icon.SkipForward size={15} strokeWidth={2.5} /> Übung überspringen
                    </button>
                  )}
                </div>
              </div>
            </>
          )}

          <div className="px-4 mt-3 flex gap-2 text-xs text-gray-500">
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2 text-center">
              <div className="uppercase tracking-wider text-[10px]">Volumen</div>
              <div className="font-mono-num text-gray-800 font-bold mt-0.5">{Math.round(totalVolume)} kg</div>
            </div>
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2 text-center">
              <div className="uppercase tracking-wider text-[10px]">{isCardio ? 'Einheiten' : 'Sätze'}</div>
              <div className="font-mono-num text-gray-800 font-bold mt-0.5">{totalSetsDone}</div>
            </div>
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2 text-center">
              <div className="uppercase tracking-wider text-[10px]">Pause</div>
              <div className="font-mono-num text-gray-800 font-bold mt-0.5">{(currentExercise.restSeconds || state.profile.restSeconds)}s</div>
            </div>
          </div>

          {totalSetsDone > 0 && !allExercisesDone && (
            <div className="px-4 mt-3">
              <button onClick={() => finishWorkout(false)} className="w-full text-xs text-gray-500 hover:text-gray-700 py-2">
                Training früher beenden
              </button>
            </div>
          )}

          <div className="px-4 mt-3 mb-1">
            <div className="rounded-2xl bg-gray-50 border border-gray-200 overflow-hidden">
              <div className="flex items-center gap-2 px-3 pt-2.5 pb-1">
                <Icon.Edit3 size={12} className="text-gray-400" strokeWidth={2} />
                <div className="text-[10px] uppercase tracking-wider text-gray-400">Notiz zum Training</div>
              </div>
              <textarea
                value={workoutNote}
                onChange={e => {
                  setWorkoutNote(e.target.value);
                  updateActive({ ...aw, note: e.target.value });
                }}
                placeholder="Wie war das Training? Knieschmerzen, PB-Feeling, …"
                rows={2}
                className="w-full bg-transparent px-3 pb-3 text-sm text-gray-800 outline-none resize-none placeholder:text-gray-400"
              />
            </div>
          </div>

          <div className="px-4 mt-1 mb-4">
            <button onClick={() => { setAddFilter('Alle'); setAddSearch(''); setShowAddExercise(true); }}
              className="w-full py-2.5 rounded-xl border border-dashed border-gray-300 text-gray-500 text-xs font-medium flex items-center justify-center gap-1.5 hover:border-emerald-400 hover:text-emerald-700 active:bg-emerald-50 transition">
              <Icon.Plus size={14} strokeWidth={3} /> Spontane Übung hinzufügen
            </button>
          </div>

          {editingName && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-gray-50 border border-gray-200 rounded-3xl p-6 max-w-sm w-full">
                <div className="text-xs uppercase tracking-[0.3em] text-gray-500 text-center">Übung umbenennen</div>
                <div className="font-display text-2xl text-center mt-2 text-gray-900">Anderer Name?</div>
                <div className="text-xs text-gray-500 text-center mt-1">Tracking & Vorschläge laufen unter dem neuen Namen.</div>
                <input
                  type="text"
                  value={nameDraft}
                  onChange={(e) => setNameDraft(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') saveExerciseName(); }}
                  autoFocus
                  className="mt-5 w-full bg-white border border-gray-300 focus:border-emerald-400 rounded-xl px-4 py-3 text-gray-900 text-lg outline-none font-medium"
                  placeholder="z.B. Hackenschmidt"
                />
                <div className="mt-5 flex gap-2">
                  <button onClick={() => setEditingName(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-800 font-medium">Abbrechen</button>
                  <button onClick={saveExerciseName} disabled={!nameDraft.trim()} className="flex-1 py-3 rounded-xl bg-emerald-100 disabled:bg-gray-100 disabled:text-gray-400 text-emerald-900 font-bold">Speichern</button>
                </div>
              </div>
            </div>
          )}

          {editingSet && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full">
                <div className="text-center mb-4">
                  <div className="text-xs uppercase tracking-[0.3em] text-gray-500">{isCardio ? 'Einheit bearbeiten' : 'Satz bearbeiten'}</div>
                  <div className="font-display text-2xl text-gray-900 mt-1">{isCardio ? 'Einheit' : 'Satz'} {editingSet.setIdx + 1}</div>
                </div>
                <div className="mb-5">
                  {isCardio ? (
                    <div className={`grid gap-3 ${currentExercise.name === 'Rudermaschine' ? 'grid-cols-3' : 'grid-cols-2'}`}>
                      <NumberStepper label="Minuten" unit="min" value={editSetReps} setValue={setEditSetReps} step={1} min={1} />
                      {currentExercise.name === 'Rudermaschine' && (
                        <NumberStepper label="Stufe" unit="" value={editSetWeight} setValue={setEditSetWeight} step={1} min={1} max={10} />
                      )}
                      <NumberStepper label="Meter" unit="m" value={editSetMeters} setValue={setEditSetMeters} step={100} min={100} />
                    </div>
                  ) : currentExercise.bodyweight ? (
                    <div className="max-w-[160px] mx-auto">
                      <NumberStepper label="Wdh." unit="" value={editSetReps} setValue={setEditSetReps} step={1} min={0} />
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 gap-3">
                      <NumberStepper label={currentExercise.useBarbell ? 'Scheiben' : 'Gewicht'} unit="kg" value={editSetWeight} setValue={setEditSetWeight} step={2.5} min={0} />
                      <NumberStepper label="Wdh." unit="" value={editSetReps} setValue={setEditSetReps} step={1} min={0} />
                    </div>
                  )}
                </div>
                {!isCardio && !currentExercise.bodyweight && currentExercise.useBarbell && (
                  <div className="text-center text-[11px] text-gray-500 mb-4">
                    Tatsächlich: <span className="font-mono-num font-bold text-emerald-700">{editSetWeight + (currentExercise.barWeight || 20)} kg</span>
                  </div>
                )}
                <div className="flex gap-2">
                  <button onClick={() => setEditingSet(null)} className="flex-1 py-3 rounded-xl bg-gray-100 border border-gray-200 text-gray-900 font-medium">
                    Abbrechen
                  </button>
                  <button onClick={saveSetEdit} disabled={editSetReps === 0} className="flex-1 py-3 rounded-xl bg-emerald-500 disabled:bg-gray-300 text-white disabled:text-gray-500 font-bold">
                    Speichern
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Add Exercise Sheet */}
          {showAddExercise && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end">
              <div className="bg-white w-full rounded-t-3xl max-h-[85vh] flex flex-col" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                <div className="flex items-center justify-between px-4 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
                  <div>
                    <div className="font-display text-xl text-gray-900">Übung hinzufügen</div>
                    <div className="text-xs text-gray-500 mt-0.5">Wird ans Ende des Trainings angehängt</div>
                  </div>
                  <button onClick={() => setShowAddExercise(false)} className="text-gray-400 p-1"><Icon.X size={22} /></button>
                </div>
                {/* Search */}
                <div className="px-4 pt-2 pb-1 flex-shrink-0">
                  <div className="relative">
                    <Icon.Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" strokeWidth={2} />
                    <input
                      type="text"
                      value={addSearch}
                      onChange={e => { setAddSearch(e.target.value); if (e.target.value) setAddFilter('Alle'); }}
                      placeholder="Suchen…"
                      className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-400 rounded-xl pl-8 pr-3 py-2 text-sm text-gray-900 outline-none"
                    />
                    {addSearch && (
                      <button onClick={() => setAddSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <Icon.X size={14} />
                      </button>
                    )}
                  </div>
                </div>
                <div className={`flex gap-2 overflow-x-auto px-4 py-2 flex-shrink-0 ${addSearch ? 'opacity-40 pointer-events-none' : ''}`}>
                  {['Alle', ...LIBRARY_CATEGORIES].map(cat => (
                    <button key={cat} onClick={() => setAddFilter(cat)}
                      className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition ${addFilter === cat ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-600'}`}>
                      {cat}
                    </button>
                  ))}
                </div>
                <div className="overflow-y-auto flex-1 px-4 pb-4">
                  <div className="space-y-2 mt-1">
                    {(addSearch
                      ? EXERCISE_LIBRARY.filter(e => e.name.toLowerCase().includes(addSearch.toLowerCase()) || e.focus.toLowerCase().includes(addSearch.toLowerCase()))
                      : addFilter === 'Alle' ? EXERCISE_LIBRARY : EXERCISE_LIBRARY.filter(e => e.category === addFilter)
                    ).map(ex => {
                      const alreadyIn = aw.exercises.some(e => e.name === ex.name);
                      return (
                        <button key={ex.name} onClick={() => addExercise(ex)}
                          className="w-full text-left p-3 rounded-xl border bg-white border-gray-200 active:bg-emerald-50 active:border-emerald-300 flex items-center gap-3 transition">
                          <div className="flex-1 min-w-0">
                            <div className="font-medium text-gray-900 text-sm flex items-center gap-2">
                              {ex.name}
                              {alreadyIn && <span className="text-[10px] text-amber-600 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded">bereits drin</span>}
                            </div>
                            <div className="text-[10px] text-gray-500">{ex.focus} · {ex.sets}×{ex.repRange[0]}–{ex.repRange[1]} Wdh.</div>
                          </div>
                          <Icon.Plus size={16} className="text-emerald-600 flex-shrink-0" strokeWidth={3} />
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Exercise Swap Sheet */}
          {showSwap && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end">
              <div className="bg-white w-full rounded-t-3xl max-h-[85vh] flex flex-col" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                <div className="flex items-center justify-between px-4 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
                  <div>
                    <div className="font-display text-xl text-gray-900">Übung wechseln</div>
                    <div className="text-xs text-gray-500 mt-0.5">Ersatz für <span className="font-medium text-gray-700">{currentExercise.name}</span></div>
                  </div>
                  <button onClick={() => setShowSwap(false)} className="text-gray-400 p-1"><Icon.X size={22} /></button>
                </div>
                {/* Search */}
                <div className="px-4 pt-2 pb-1 flex-shrink-0">
                  <div className="relative">
                    <Icon.Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" strokeWidth={2} />
                    <input
                      type="text"
                      value={swapSearch}
                      onChange={e => { setSwapSearch(e.target.value); if (e.target.value) setSwapFilter('Alle'); }}
                      placeholder="Suchen…"
                      className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-400 rounded-xl pl-8 pr-3 py-2 text-sm text-gray-900 outline-none"
                    />
                    {swapSearch && (
                      <button onClick={() => setSwapSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <Icon.X size={14} />
                      </button>
                    )}
                  </div>
                </div>
                {/* Category filter */}
                <div className={`flex gap-2 overflow-x-auto px-4 py-2 flex-shrink-0 ${swapSearch ? 'opacity-40 pointer-events-none' : ''}`}>
                  {['Alle', ...LIBRARY_CATEGORIES].map(cat => (
                    <button key={cat} onClick={() => setSwapFilter(cat)}
                      className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition ${swapFilter === cat ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-600'}`}>
                      {cat}
                    </button>
                  ))}
                </div>
                {/* Exercise list */}
                <div className="overflow-y-auto flex-1 px-4 pb-4">
                  <div className="space-y-2 mt-1">
                    {(swapSearch
                      ? EXERCISE_LIBRARY.filter(e => e.name.toLowerCase().includes(swapSearch.toLowerCase()) || e.focus.toLowerCase().includes(swapSearch.toLowerCase()))
                      : swapFilter === 'Alle' ? EXERCISE_LIBRARY : EXERCISE_LIBRARY.filter(e => e.category === swapFilter)
                    ).map(ex => {
                      const isCurrent = ex.name === currentExercise.name;
                      return (
                        <button key={ex.name} onClick={() => !isCurrent && swapExercise(ex)}
                          className={`w-full text-left p-3 rounded-xl border flex items-center gap-3 transition ${
                            isCurrent
                              ? 'bg-emerald-50 border-emerald-200 cursor-default opacity-50'
                              : 'bg-white border-gray-200 active:bg-emerald-50 active:border-emerald-300'
                          }`}>
                          <div className="flex-1 min-w-0">
                            <div className="font-medium text-gray-900 text-sm">{ex.name}</div>
                            <div className="text-[10px] text-gray-500">{ex.focus} · {ex.cardio ? `${ex.repRange[0]}–${ex.repRange[1]} min` : `${ex.sets}×${ex.repRange[0]}–${ex.repRange[1]} Wdh.`} {ex.bodyweight ? '· Körpergewicht' : ''}</div>
                          </div>
                          {isCurrent
                            ? <span className="text-[10px] text-emerald-600 font-medium flex-shrink-0">Aktuell</span>
                            : <Icon.Shuffle size={14} className="text-gray-400 flex-shrink-0" strokeWidth={2} />}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {confirmAbort && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-gray-50 border border-gray-200 rounded-3xl p-6 max-w-sm w-full">
                <Icon.AlertTriangle size={32} className="text-amber-400 mx-auto" />
                <div className="font-display text-3xl text-center mt-3">{totalSetsDone > 0 ? 'Training beenden?' : 'Training abbrechen?'}</div>
                <div className="text-sm text-gray-600 text-center mt-2">
                  {totalSetsDone > 0
                    ? `Du hast ${totalSetsDone} ${isCardio ? 'Einheit/Einheiten' : 'Satz/Sätze'} geloggt. Der Fortschritt wird gespeichert.`
                    : 'Es wurde noch nichts geloggt — dieses Training wird verworfen.'}
                </div>
                <div className="mt-5 flex gap-2">
                  <button onClick={() => setConfirmAbort(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-800 font-medium">Weiter trainieren</button>
                  {totalSetsDone > 0 ? (
                    <button onClick={() => finishWorkout(false)} className="flex-1 py-3 rounded-xl bg-emerald-500 text-white font-bold">Speichern & Beenden</button>
                  ) : (
                    <button onClick={() => { persist({ ...state, activeWorkout: null }); setConfirmAbort(false); }} className="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold">Verwerfen</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========================================================================
    // HISTORY
    // ========================================================================
    const HistoryView = ({ state, setView, persist }) => {
      const [expanded, setExpanded] = useState(null);
      const [editDuration, setEditDuration] = useState(null); // { workoutId, value }
      const [editExercise, setEditExercise] = useState(null); // { workoutId, exIdx }
      const [editSetModal, setEditSetModal] = useState(null); // { workoutId, exIdx, setIdx, weight, reps, warmup, meters }
      const sorted = [...state.workouts].reverse();

      const saveDuration = () => {
        if (!editDuration) return;
        const min = parseInt(editDuration.value, 10);
        if (isNaN(min) || min < 1) { setEditDuration(null); return; }
        const nextWorkouts = state.workouts.map((w) =>
          w.id === editDuration.workoutId ? { ...w, durationMin: min } : w
        );
        persist({ ...state, workouts: nextWorkouts });
        setEditDuration(null);
      };

      const updateExerciseName = (workoutId, exIdx, newName) => {
        const trimmed = (newName || '').trim();
        if (!trimmed) return;
        const nextWorkouts = state.workouts.map((w) => {
          if (w.id !== workoutId) return w;
          const nextEx = [...w.exercises];
          nextEx[exIdx] = { ...nextEx[exIdx], name: trimmed };
          return { ...w, exercises: nextEx };
        });
        persist({ ...state, workouts: nextWorkouts });
        setEditExercise(null);
      };

      const saveSetEdit = () => {
        if (!editSetModal) return;
        const { workoutId, exIdx, setIdx, weight, reps, warmup, meters } = editSetModal;
        if (reps === 0) return;
        const nextWorkouts = state.workouts.map((w) => {
          if (w.id !== workoutId) return w;
          const nextEx = [...w.exercises];
          const nextSets = [...nextEx[exIdx].completedSets];
          nextSets[setIdx] = { ...nextSets[setIdx], weight, reps, warmup, meters: meters != null ? meters : nextSets[setIdx].meters };
          nextEx[exIdx] = { ...nextEx[exIdx], completedSets: nextSets };
          // Recalculate total volume for this workout
          const totalVolume = nextEx.reduce((sum, ex) => sum + ex.completedSets.reduce((s, set) => s + (set.weight || 0) * set.reps, 0), 0);
          const setsCompleted = nextEx.reduce((s, ex) => s + ex.completedSets.filter(set => !set.warmup).length, 0);
          return { ...w, exercises: nextEx, totalVolume: Math.round(totalVolume), setsCompleted };
        });
        persist({ ...state, workouts: nextWorkouts });
        setEditSetModal(null);
      };

      return (
        <div className="min-h-screen pb-28 relative grain">
          <div className="px-5 pt-6 pb-2 flex items-center gap-3">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-gray-900">
              <Icon.ChevronLeft size={28} />
            </button>
            <div>
              <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Verlauf</div>
              <div className="font-display text-4xl text-gray-900">DEINE SESSIONS</div>
            </div>
          </div>

          <div className="px-5 mt-2 grid grid-cols-3 gap-2 text-center">
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-3">
              <div className="text-[10px] uppercase tracking-wider text-gray-500">Gesamt</div>
              <div className="font-display text-2xl text-emerald-700 mt-1">{state.workouts.length}</div>
            </div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-3">
              <div className="text-[10px] uppercase tracking-wider text-gray-500">Volumen</div>
              <div className="font-display text-2xl text-emerald-700 mt-1">{Math.round(state.stats.totalVolume / 1000)}t</div>
            </div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-3">
              <div className="text-[10px] uppercase tracking-wider text-gray-500">Beste Serie</div>
              <div className="font-display text-2xl text-emerald-700 mt-1">{state.stats.bestStreak || 0}</div>
            </div>
          </div>

          <div className="px-5 mt-4 space-y-2">
            {sorted.length === 0 && <div className="text-center text-gray-500 py-12">Noch keine Workouts geloggt.</div>}
            {sorted.map((w) => {
              const isOpen = expanded === w.id;
              return (
                <div key={w.id} className="rounded-2xl bg-gray-50 border border-gray-200 overflow-hidden">
                  <button onClick={() => setExpanded(isOpen ? null : w.id)} className="w-full p-4 flex items-center gap-3 text-left">
                    <div className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center font-display text-2xl text-emerald-700">{w.templateCode}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-gray-900 flex items-center gap-2">
                        {w.templateName}
                        {w.aborted && <span className="text-[10px] bg-amber-400/20 text-amber-300 px-1.5 py-0.5 rounded">abgebr.</span>}
                      </div>
                      <div className="text-xs text-gray-500 mt-0.5">{formatDateLong(w.date)}</div>
                    </div>
                    <div className="text-right">
                      <div className="font-mono-num text-sm text-gray-800">{w.durationMin}min</div>
                      <div className="font-mono-num text-xs text-emerald-700">+{w.xpEarned} XP</div>
                    </div>
                    {isOpen ? <Icon.ChevronUp size={18} className="text-gray-500" /> : <Icon.ChevronDown size={18} className="text-gray-500" />}
                  </button>
                  {isOpen && (
                    <div className="px-4 pb-4 pt-1 border-t border-gray-200 space-y-2">
                      <div className="flex gap-2 text-xs text-gray-600 mt-2">
                        <div className="flex-1">📦 {w.totalVolume} kg Volumen</div>
                        <div className="flex-1 text-right">✓ {w.setsCompleted}/{w.setsPlanned} Sätze</div>
                      </div>
                      {w.note && (
                        <div className="mt-2 flex items-start gap-1.5 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
                          <Icon.Edit3 size={11} className="text-amber-500 mt-0.5 flex-shrink-0" strokeWidth={2} />
                          <div className="text-xs text-amber-800 leading-relaxed">{w.note}</div>
                        </div>
                      )}
                      <div className="flex gap-2 mt-1">
                        <button onClick={() => setEditDuration({ workoutId: w.id, value: String(w.durationMin) })}
                          className="flex items-center gap-1 text-xs text-gray-500 hover:text-emerald-700 bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 transition">
                          <Icon.Clock size={12} /> Zeit ändern
                        </button>
                        <button onClick={() => setEditExercise({ workoutId: w.id, exIdx: 0 })}
                          className="flex items-center gap-1 text-xs text-gray-500 hover:text-emerald-700 bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 transition">
                          <Icon.Edit3 size={12} /> Übungen editieren
                        </button>
                      </div>
                      {w.exercises.filter(e => e.completedSets.length > 0).map((ex, i) => (
                        <div key={i} className="border-t border-gray-200/70 pt-2">
                          <div className="flex items-center justify-between">
                            <div className="text-sm font-semibold text-gray-800">{ex.name}</div>

                            </button>

                          <div className="flex flex-wrap gap-1 mt-1">
                            {ex.completedSets.map((s, j) => (
                              <button key={j} onClick={() => setEditSetModal({ workoutId: w.id, exIdx: i, setIdx: j, weight: s.weight || 0, reps: s.reps, warmup: s.warmup || false, meters: s.meters || 0 })}
                                className={`text-[11px] font-mono-num rounded px-2 py-0.5 ${s.warmup ? 'bg-gray-100 text-gray-400 hover:bg-gray-200' : 'bg-gray-100 text-gray-700 hover:bg-emerald-100'} transition`}>

                                {s.meters
                                  ? `${s.reps}min${ex.name === 'Rudergerät' || ex.name === 'Rudermaschine' ? ' · St.' + s.weight : ''} · ${s.meters}m`

          </div>

          {/* Edit Duration Modal */}
          {editDuration && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">

                </div>
                <div className="flex items-center gap-2 mb-5">
                  <button onClick={() => setEditDuration({ ...editDuration, value: String(Math.max(1, parseInt(editDuration.value || 0, 10) - 1)) })}
                    className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center text-gray-700 active:bg-gray-200 text-xl font-bold">−</button>
                  <input type="number" inputMode="numeric" value={editDuration.value}
                    onChange={e => setEditDuration({ ...editDuration, value: e.target.value })}
                    className="flex-1 text-center font-mono-num text-4xl font-bold text-gray-900 bg-gray-50 border border-gray-200 rounded-2xl py-4 outline-none focus:border-emerald-400"
                    autoFocus />

                    className="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center text-gray-700 active:bg-gray-200 text-xl font-bold">+</button>

                </div>

          {/* Edit Exercise Name Modal */}
          {editExercise && (() => {
            const w = state.workouts.find((x) => x.id === editExercise.workoutId);

            if (!ex) return null;
            return (
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">

                  </div>
                  <div className="mb-4">
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Aktuell</div>
                    <input type="text" defaultValue={ex.name}
                      onKeyDown={(e) => { if (e.key === 'Enter') updateExerciseName(editExercise.workoutId, editExercise.exIdx, e.target.value); }}

                    <button onClick={() => setEditExercise(null)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Abbrechen</button>
                    <button onClick={(e) => {

            const w = state.workouts.find((x) => x.id === editSetModal.workoutId);
            const ex = w?.exercises[editSetModal.exIdx];

            return (
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
