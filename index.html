    const ActivityView = ({ state, persist, setView }) => {
      const activities = state.activities || [];
      const [showForm, setShowForm] = useState(false);
      const [editId, setEditId]     = useState(null);

      // Form state
      const [actType,  setActType]  = useState('jogging');
      const [date,     setDate]     = useState(() => new Date().toISOString().slice(0, 10));
      const [dur,      setDur]      = useState('');   // minutes
      const [km,       setKm]       = useState('');
      const [bpm,      setBpm]      = useState('');
      const [kcal,     setKcal]     = useState('');
      const [note,     setNote]     = useState('');

      const resetForm = () => {
        setEditId(null); setActType('jogging');
        setDate(new Date().toISOString().slice(0, 10));
        setDur(''); setKm(''); setBpm(''); setKcal(''); setNote('');
      };

      const openNew = () => { resetForm(); setShowForm(true); };

      const openEdit = (a) => {
        setEditId(a.id); setActType(a.activityType);
        setDate(a.date); setDur(String(a.durationMin));
        setKm(a.km != null ? String(a.km) : '');
        setBpm(a.bpm != null ? String(a.bpm) : '');
        setKcal(a.kcal != null ? String(a.kcal) : '');
        setNote(a.note || '');
        setShowForm(true);
      };

      const canSave = dur && Number(dur) > 0 && (actType === 'tennis' || (km && Number(km) > 0));

      const saveActivity = () => {
        if (!canSave) return;
        const entry = {
          id: editId || ('a_' + Date.now()),
          date, activityType: actType,
          durationMin: Number(dur),
          km:   km   ? Number(km)   : null,
          bpm:  bpm  ? Number(bpm)  : null,
          kcal: kcal ? Number(kcal) : null,
          note: note.trim() || null,
        };
        const next = editId
          ? activities.map((a) => a.id === editId ? entry : a)
          : [entry, ...activities];
        persist({ ...state, activities: next });
        setShowForm(false); resetForm();
      };

      const deleteActivity = (id) => {
        if (!confirm('Einheit löschen?')) return;
        persist({ ...state, activities: activities.filter((a) => a.id !== id) });
      };

      const pace = (km, min) => {
        if (!km || !min || km === 0) return null;
        const mPerKm = min / km;
        return `${Math.floor(mPerKm)}:${String(Math.round((mPerKm % 1) * 60)).padStart(2, '0')} /km`;
      };

      const TYPES = {
        jogging: { label: 'Joggen', emoji: '🏃', color: 'bg-blue-50 border-blue-200 text-blue-900' },
        tennis:  { label: 'Tennis', emoji: '🎾', color: 'bg-amber-50 border-amber-200 text-amber-900' },
      };

      // Summary stats (last 30 days)
      const last30 = activities.filter(a => {
        const d = new Date(a.date);
        const now = new Date();
        return (now - d) / 86400000 <= 30;
      });
      const jogLast30 = last30.filter(a => a.activityType === 'jogging');
      const totalKm30 = jogLast30.reduce((s, a) => s + (a.km || 0), 0);
      const totalMin30 = last30.reduce((s, a) => s + a.durationMin, 0);

      return (
        <div className="min-h-screen bg-white flex flex-col" style={{ paddingTop: 'env(safe-area-inset-top)' }}>
          {/* Header */}
          <div className="flex items-center justify-between px-5 pt-5 pb-3">
            <div>
              <div className="font-display text-3xl text-gray-900">AKTIVITÄT</div>
              <div className="text-xs text-gray-500 mt-0.5">Joggen & Tennis</div>
            </div>
            <button onClick={openNew}
              className="w-10 h-10 rounded-2xl bg-lime-300 flex items-center justify-center active:scale-95 transition">
              <Icon.Plus size={22} strokeWidth={3} className="text-gray-900" />
            </button>
          </div>

          {/* Summary chips (last 30 days) */}
          {activities.length > 0 && (
            <div className="flex gap-3 px-5 pb-4">
              <div className="flex-1 rounded-2xl bg-blue-50 border border-blue-200 p-3">
                <div className="text-[10px] uppercase tracking-wider text-blue-600 mb-1">Km · 30 Tage</div>
                <div className="font-display text-3xl text-blue-900">{totalKm30.toFixed(1)}</div>
              </div>
              <div className="flex-1 rounded-2xl bg-gray-50 border border-gray-200 p-3">
                <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Einheiten · 30 Tage</div>
                <div className="font-display text-3xl text-gray-900">{last30.length}</div>
              </div>
              <div className="flex-1 rounded-2xl bg-gray-50 border border-gray-200 p-3">
                <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Stunden · 30 Tage</div>
                <div className="font-display text-3xl text-gray-900">{(totalMin30 / 60).toFixed(1)}</div>
              </div>
            </div>
          )}

          {/* Activity list */}
          <div className="flex-1 overflow-y-auto px-5 pb-28 space-y-3">
            {activities.length === 0 && (
              <div className="text-center py-20 text-gray-400">
                <div className="text-4xl mb-3">🏃</div>
                <div className="font-semibold text-gray-500">Noch keine Einheiten</div>
                <div className="text-sm mt-1">Tippe auf + um eine zu loggen</div>
              </div>
            )}
            {activities.sort((a, b) => new Date(b.date) - new Date(a.date)).map((a) => {
              const t = TYPES[a.activityType] || TYPES.jogging;
              const p = pace(a.km, a.durationMin);
              return (
                <div key={a.id} className={`rounded-2xl border p-4 ${t.color}`}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex items-center gap-2">
                      <span className="text-2xl">{t.emoji}</span>
                      <div>
                        <div className="font-semibold text-sm">{t.label}</div>
                        <div className="text-xs opacity-70">{formatDateLong(a.date)}</div>
                      </div>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => openEdit(a)} className="p-2 rounded-xl hover:bg-black/5 transition">
                        <Icon.Edit3 size={14} strokeWidth={2} />
                      </button>
                      <button onClick={() => deleteActivity(a.id)} className="p-2 rounded-xl hover:bg-red-100 transition text-red-500">
                        <Icon.Trash2 size={14} strokeWidth={2} />
                      </button>
                    </div>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-3">
                    <span className="text-xs font-medium bg-white/60 rounded-xl px-2.5 py-1">⏱ {a.durationMin} min</span>
                    {a.km   != null && <span className="text-xs font-medium bg-white/60 rounded-xl px-2.5 py-1">📍 {a.km} km</span>}
                    {p      != null && <span className="text-xs font-medium bg-white/60 rounded-xl px-2.5 py-1">⚡ {p}</span>}
                    {a.bpm  != null && <span className="text-xs font-medium bg-white/60 rounded-xl px-2.5 py-1">❤️ {a.bpm} bpm</span>}
                    {a.kcal != null && <span className="text-xs font-medium bg-white/60 rounded-xl px-2.5 py-1">🔥 {a.kcal} kcal</span>}
                  </div>
                  {a.note && (
                    <div className="mt-2 text-xs opacity-80 italic leading-relaxed">"{a.note}"</div>
                  )}
                </div>
              );
            })}
          </div>

          <BottomNav active="activity" setView={setView} hasHistory={state.workouts.length > 0} />

          {/* Log / Edit sheet */}
          {showForm && (
            <div className="fixed inset-0 z-50 flex flex-col justify-end bg-black/40" onClick={(e) => { if (e.target === e.currentTarget) { setShowForm(false); resetForm(); } }}>
              <div className="bg-white rounded-t-3xl px-5 pt-5 pb-10 space-y-4 max-h-[92vh] overflow-y-auto"
                   style={{ paddingBottom: 'calc(2.5rem + env(safe-area-inset-bottom))' }}>
                <div className="flex items-center justify-between mb-1">
                  <div className="font-display text-2xl text-gray-900">{editId ? 'Einheit bearbeiten' : 'Einheit loggen'}</div>
                  <button onClick={() => { setShowForm(false); resetForm(); }} className="text-gray-400 p-1"><Icon.X size={22} /></button>
                </div>

                {/* Type selector */}
                <div className="flex gap-2">
                  {Object.entries(TYPES).map(([k, v]) => (
                    <button key={k} onClick={() => setActType(k)}
                      className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl border font-semibold text-sm transition ${actType === k ? 'bg-gray-900 border-gray-900 text-white' : 'bg-gray-50 border-gray-200 text-gray-700'}`}>
                      <span>{v.emoji}</span>{v.label}
                    </button>
                  ))}
                </div>

                {/* Date */}
                <div>
                  <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Datum</div>
                  <input type="date" value={date} onChange={e => setDate(e.target.value)}
                    className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400" />
                </div>

                {/* Duration — always required */}
                <div>
                  <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Dauer (min) <span className="text-red-400">*</span></div>
                  <input type="number" inputMode="decimal" placeholder="45" value={dur} onChange={e => setDur(e.target.value)}
                    className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400" />
                </div>

                {/* KM — required for jogging, hidden for tennis */}
                {actType === 'jogging' && (
                  <div>
                    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Distanz (km) <span className="text-red-400">*</span></div>
                    <input type="number" inputMode="decimal" placeholder="5.0" value={km} onChange={e => setKm(e.target.value)}
                      className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400" />
                    {km && dur && Number(km) > 0 && Number(dur) > 0 && (
                      <div className="text-xs text-emerald-700 mt-1.5 px-1">⚡ Pace: {pace(Number(km), Number(dur))}</div>
                    )}
                  </div>
                )}

                {/* Optional fields */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Herzfrequenz (bpm)</div>
                    <input type="number" inputMode="decimal" placeholder="148" value={bpm} onChange={e => setBpm(e.target.value)}
                      className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400" />
                  </div>
                  <div>
                    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Kalorien</div>
                    <input type="number" inputMode="decimal" placeholder="420" value={kcal} onChange={e => setKcal(e.target.value)}
                      className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400" />
                  </div>
                </div>

                {/* Note */}
                <div>
                  <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Notiz</div>
                  <textarea value={note} onChange={e => setNote(e.target.value)}
                    placeholder="Wie war's?" rows={2}
                    className="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 outline-none focus:border-emerald-400 resize-none" />
                </div>

                <button onClick={saveActivity} disabled={!canSave}
                  className="w-full py-4 rounded-2xl bg-lime-300 disabled:bg-gray-100 disabled:text-gray-400 text-gray-900 font-display text-xl active:scale-[0.98] transition">
                  {editId ? 'SPEICHERN' : 'LOGGEN'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========================================================================
    // MAIN
    // ========================================================================
    const GymApp = () => {
      const [loaded, setLoaded] = useState(false);
      const [state, setState] = useState(DEFAULT_STATE);
      const [view, setView] = useState('dashboard');
      const [syncConfig, setSyncConfig] = useState(() => loadSyncConfig());
      const [syncStatus, setSyncStatus] = useState('idle');
      const [notifPermission, setNotifPermission] = useState(() =>
        typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
      );
      const syncTimer = React.useRef(null);

      // Initialize Supabase client if config exists on mount
      useEffect(() => {
        if (syncConfig?.url && syncConfig?.anonKey) {
          getSupabaseClient(syncConfig.url, syncConfig.anonKey);
        }
      }, []);

      // On mount: try to load from Supabase first, fall back to localStorage
      useEffect(() => {
        (async () => {
          let data = loadState(); // localStorage baseline

          if (syncConfig?.userId && syncConfig?.url && syncConfig?.anonKey) {
            try {
              const remote = await pullFromSupabase(syncConfig);
              if (remote?.data) {
                // Use remote if it's newer than local (or no local data)
                const localTs = data?._updatedAt || 0;
                const remoteTs = remote.updated_at || 0;
                if (!data || remoteTs > localTs) {
                  data = remote.data;
                  saveState(data); // cache locally
                }
              }
            } catch { /* offline or error — use local */ }
          }

          if (data) {
            const currentWeek = getWeekStart();
            if (data.stats.weekStart && data.stats.weekStart !== currentWeek) {
              const planDef = resolvePlan(data.profile.plan, data.userPlans || {});
              const isVacation = data.vacationUntil && new Date(data.vacationUntil) >= new Date();
              if (!isVacation && data.stats.sessionsThisWeek < planDef.daysPerWeek) data.stats.streak = 0;
              if (!isVacation) data.stats.sessionsThisWeek = 0;
              data.stats.weekStart = currentWeek;
              saveState(data);
            } else if (!data.stats.weekStart) {
              data.stats.weekStart = currentWeek;
            }
            setState(data);
          } else {
            const fresh = { ...DEFAULT_STATE, stats: { ...DEFAULT_STATE.stats, weekStart: getWeekStart() } };
            setState(fresh);
            saveState(fresh);
          }
          setLoaded(true);

          // Schedule streak-danger notification if permission granted
          if (typeof window.IronblockNotif !== 'undefined' && Notification.permission === 'granted') {
            const loaded = loadState();
            const todayStr = new Date().toISOString().slice(0, 10);
            const hasTrainedToday = (loaded?.workouts || []).some(w => w.date?.slice(0, 10) === todayStr);
            const streak = loaded?.stats?.streak || 0;
            if (streak > 0) {
              // Wait for SW to be ready, then schedule
              navigator.serviceWorker?.ready.then(() => {
                window.IronblockNotif.scheduleStreakCheck({ hasTrainedToday, reminderHour: 20 });
              });
            }
          }
        })();
      }, []);

      const setSyncIndicator = (status) => {
        setSyncStatus(status);
        if (syncTimer.current) clearTimeout(syncTimer.current);
        if (status === 'ok' || status === 'error') {
          syncTimer.current = setTimeout(() => setSyncStatus('idle'), 3000);
        }
      };

      const persist = useCallback((next, force = false) => {
        // CRITICAL SAFETY GUARD: Never silently lose workouts
        const currentStored = loadState();
        const nextWorkouts = next.workouts || [];
        const currentWorkouts = currentStored?.workouts || [];
        
        if (nextWorkouts.length < currentWorkouts.length && !force) {
          // eslint-disable-next-line no-console
          console.error('🚨 BLOCKED: persist would delete workouts! Current:', currentWorkouts.length, '→ Next:', nextWorkouts.length, '\nUse force=true if this is intentional (reset).');
          return; // Do NOT save — this prevents data loss
        }

        // Safety guard: don't push an empty-looking state to cloud if it could overwrite real data
        const cfg = loadSyncConfig();
        const looksEmpty = nextWorkouts.length === 0;
        const hasCloudConfig = cfg?.userId && cfg?.url && cfg?.anonKey;
        if (looksEmpty && hasCloudConfig && !force) {
          // Try to pull existing cloud data first before overwriting
          pullFromSupabase(cfg).then((remote) => {
            if (remote?.data && (remote.data.workouts || []).length > 0) {
              // Cloud has real data — restore it locally instead of pushing empty state
              const restored = { ...remote.data, _updatedAt: new Date().toISOString() };
              setState(restored);
              saveState(restored);
            } else {
              // Cloud is also empty — safe to save this state
              const stamped = { ...next, _updatedAt: new Date().toISOString() };
              setState(stamped);
              saveState(stamped);
              pushToSupabase(cfg, stamped).then(({ error }) => {
                setSyncIndicator(error ? 'error' : 'ok');
              }).catch(() => setSyncIndicator('error'));
            }
          }).catch(() => {
            // Offline — just save locally, don't push
            const stamped = { ...next, _updatedAt: new Date().toISOString() };
            setState(stamped);
            saveState(stamped);
          });
          return;
        }

        // Normal path for non-empty states
        const stamped = { ...next, _updatedAt: new Date().toISOString() };
        setState(stamped);
        saveState(stamped);
        if (hasCloudConfig) {
          setSyncIndicator('syncing');
          pushToSupabase(cfg, stamped).then(({ error }) => {
            setSyncIndicator(error ? 'error' : 'ok');
          }).catch(() => setSyncIndicator('error'));
        }
      }, []);

      const updateSyncConfig = (cfg) => {
        saveSyncConfig(cfg);
        setSyncConfig(cfg);
        if (cfg?.url && cfg?.anonKey) {
          resetSupabaseClient();
          getSupabaseClient(cfg.url, cfg.anonKey);
        }
      };

      if (!loaded) return <SplashScreen />;

      // Sync status indicator — small floating badge
      const SyncBadge = () => {
        if (syncStatus === 'idle' && !syncConfig?.userId) return null;
        return (
          <div className={`fixed top-0 right-0 z-40 flex items-center gap-1 text-[9px] font-medium px-2 py-1 rounded-bl-lg transition ${
            syncStatus === 'syncing' ? 'bg-amber-100 text-amber-700'
            : syncStatus === 'ok'   ? 'bg-emerald-100 text-emerald-700'
            : syncStatus === 'error'? 'bg-red-100 text-red-600'
            : 'bg-gray-100 text-gray-500'
          }`} style={{ marginTop: 'env(safe-area-inset-top)' }}>
            {syncStatus === 'syncing' && '⟳ Syncing…'}
            {syncStatus === 'ok'      && '✓ Synced'}
            {syncStatus === 'error'   && '✗ Sync-Fehler'}
            {syncStatus === 'idle' && syncConfig?.userId && '☁ ' + syncConfig.userId}
          </div>
        );
      };

      return (
        <>
          <SyncBadge />
          {state.activeWorkout
            ? <ActiveWorkoutView state={state} persist={persist} />
            : view === 'dashboard' ? <Dashboard state={state} persist={persist} setView={setView} />
            : view === 'activity'  ? <ActivityView state={state} persist={persist} setView={setView} />
            : view === 'insights'  ? <InsightsView state={state} setView={setView} />
            : view === 'stats'     ? <StatsView state={state} persist={persist} setView={setView} />
            : view === 'history'   ? <HistoryView state={state} persist={persist} setView={setView} />
            : view === 'settings'  ? <SettingsView state={state} persist={persist} setView={setView} syncConfig={syncConfig} updateSyncConfig={updateSyncConfig} syncStatus={syncStatus} notifPermission={notifPermission} setNotifPermission={setNotifPermission} />
            : null}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GymApp />);
  </script>

  <!-- Service Worker + Notification bootstrap -->
  <script>
    // ── Register Service Worker ───────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ironblock/sw.js').catch(() => {});
      });
    }

    // ── Global notification helpers (called from React) ───────────────────────
    // These are plain JS so they work without Babel.

    window.IronblockNotif = {
      // Request permission. Returns 'granted' | 'denied' | 'default'.
      async requestPermission() {
        if (!('Notification' in window)) return 'unsupported';
        if (Notification.permission === 'granted') return 'granted';
        return await Notification.requestPermission();
      },

      // Tell the SW to fire a rest-timer notification after `seconds`.
      scheduleRest(seconds) {
        if (!navigator.serviceWorker?.controller) return;
        navigator.serviceWorker.controller.postMessage({
          type: 'SCHEDULE_REST',
          seconds,
        });
      },

      // Cancel a pending rest-timer notification.
      cancelRest() {
        if (!navigator.serviceWorker?.controller) return;
        navigator.serviceWorker.controller.postMessage({ type: 'CANCEL_REST' });
      },

      // Schedule a streak-danger reminder for today.
      // `reminderHour` = hour (0–23) at which to fire (default 20 = 8 PM).
      scheduleStreakCheck({ hasTrainedToday, reminderHour = 20 }) {
        if (!navigator.serviceWorker?.controller) return;
        if (hasTrainedToday) return; // no need
        const now = new Date();
        const target = new Date();
        target.setHours(reminderHour, 0, 0, 0);
        const ms = target - now;
        if (ms <= 0) return; // already past reminder time
        navigator.serviceWorker.controller.postMessage({
          type: 'SCHEDULE_STREAK_CHECK',
          streakDanger: true,
          msUntilReminder: ms,
        });
      },
    };
  </script>
</body>
</html>
