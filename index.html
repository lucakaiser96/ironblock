    :root {

      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body {
      background: #ffffff;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    body {

      color: #111827;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
      min-height: 100dvh;
    }

    button { -webkit-user-select: none; user-select: none; touch-action: manipulation; }

    .font-display { font-family: 'Anton', 'Impact', sans-serif; letter-spacing: 0.02em; line-height: 0.95; }
    .font-mono-num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

    .grain::before {

    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(190, 242, 100, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(190, 242, 100, 0); } }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slide-up 0.3s ease-out; }

    .fixed-bottom-nav {
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    // ========================================================================
    // STORAGE — localStorage
    // ========================================================================
    const STORAGE_KEY = 'gymapp_state_v1';
    const BACKUP_KEY = 'gymapp_state_backup_v1';

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }
    function loadBackup() {
      try {
        const raw = localStorage.getItem(BACKUP_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }
    function hasBackup() {
      return !!localStorage.getItem(BACKUP_KEY);
    }
    function saveState(state) {
      try {
        // Safety: backup current state BEFORE overwriting
        const existing = localStorage.getItem(STORAGE_KEY);
        if (existing) {
          localStorage.setItem(BACKUP_KEY, existing);
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        return true;
      } catch (e) { console.error('Save failed:', e); return false; }
    }
    function restoreFromBackup() {
      try {
        const backup = localStorage.getItem(BACKUP_KEY);
        if (backup) {
          localStorage.setItem(STORAGE_KEY, backup);
          return JSON.parse(backup);
        }
        return null;
      } catch { return null; }
    }

      } catch { return null; }

    function saveSyncConfig(cfg) {
      try { localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg)); } catch {}
    }

    // Singleton Supabase client — created once when config is saved.
    let _sbClient = null;
    function getSupabaseClient(url, anonKey) {
      if (!_sbClient && url && anonKey) {
        _sbClient = supabase.createClient(url, anonKey, { auth: { persistSession: false } });
      }
      return _sbClient;
    }
    function resetSupabaseClient() { _sbClient = null; }

    async function pushToSupabase(cfg, appState) {
      const sb = getSupabaseClient(cfg.url, cfg.anonKey);
      if (!sb) return { error: 'No client' };
      const { error } = await sb.from('ironblock_data').upsert({
        user_id: cfg.userId,
        data: appState,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'user_id' });
      return { error };
    }

    async function pullFromSupabase(cfg) {
      const sb = getSupabaseClient(cfg.url, cfg.anonKey);
      if (!sb) return null;
      const { data, error } = await sb
        .from('ironblock_data')
        .select('data, updated_at')
        .eq('user_id', cfg.userId)
        .single();
      if (error || !data) return null;
      return data;
    }

    async function testSupabaseConnection(url, anonKey, userId) {
      try {
        const sb = supabase.createClient(url, anonKey, { auth: { persistSession: false } });
        const { error } = await sb.from('ironblock_data').select('user_id').eq('user_id', userId).limit(1);
        if (error) return { ok: false, msg: error.message };
        return { ok: true };
      } catch (e) {
        return { ok: false, msg: e.message };
      }
    }

      { name: 'Laufband',              category: 'Cardio',      focus: 'Ausdauer / Beine',      sets: 1, repRange: [5,20], barbell: false, cardio: true },
      { name: 'Crosstrainer',          category: 'Cardio',      focus: 'Ganzkörper Cardio',     sets: 1, repRange: [10,20], barbell: false, cardio: true },
      { name: 'Stepper',               category: 'Cardio',      focus: 'Ausdauer / Beine',      sets: 1, repRange: [10,20], barbell: false, cardio: true },
      { name: 'Burpees',               category: 'Cardio',      focus: 'Kondition / Ganzkörper',sets: 3, repRange: [5,15],  barbell: false, bodyweight: true },
      { name: 'Jumping Jacks',         category: 'Cardio',      focus: 'Aufwärmung / Cardio',   sets: 3, repRange: [20,30], barbell: false, bodyweight: true },
      { name: 'Battle Ropes',          category: 'Cardio',      focus: 'Kondition / Oberkörper',sets: 3, repRange: [20,30], barbell: false, bodyweight: true },
    ];

    const LIBRARY_CATEGORIES = [...new Set(EXERCISE_LIBRARY.map((e) => e.category))];
    const isCardioExercise = (name) => {
      const ex = EXERCISE_LIBRARY.find((e) => e.name === name);
      return ex && ex.cardio;
    };

    // ========================================================================
    // HELPERS
    // ========================================================================
    const DEFAULT_STATE = {
      profile: { plan: '3_fullbody_alt', restSeconds: 90, sessionIndex: 0 },
      stats: { totalXP: 0, totalVolume: 0, lastWorkoutDate: null, sessionsThisWeek: 0, weekStart: null, streak: 0, bestStreak: 0 },
      workouts: [],
      exerciseRecords: {},
      activeWorkout: null,
      customTemplates: {}, // overrides for standard templates
      barbellPrefs: {},
      goals: {},
      userPlans: {},       // { 'plan_xxxx': { label, desc, daysPerWeek, days: [{ name, code, exercises }] } }
      bodyWeight: [],      // [{ date: 'YYYY-MM-DD', kg: 80.5 }, ...]
      vacationUntil: null, // ISO date string; streak freezes until this date
      deloadMode: false,   // reduces suggested weights by 20%
      postWorkout: null,   // last finished workout for immediate insights
      activities: [],      // [{ id, date, activityType, durationMin, km, bpm, kcal, note }]
    };

    // Resolve any plan key → definition (standard or user-created)
    const resolvePlan = (planKey, userPlans = {}) =>
      userPlans[planKey] || PLAN_DEFS[planKey];

    // Resolve any template key → exercises (standard, custom-override, or inline user-plan day)
    const resolveTemplate = (planKey, dayIndex, userPlans = {}, customTemplates = {}) => {
      const plan = resolvePlan(planKey, userPlans);
      if (!plan) return null;
      if (userPlans[planKey]) {
        // User plan — template is inline inside the plan day
        return plan.days[dayIndex % plan.days.length];
      }
      // Standard plan — days are keys into TEMPLATES + customTemplates overrides
      const key = plan.days[dayIndex % plan.days.length];
      return getTemplate(key, customTemplates);
    };

    // Detect whether an exercise typically uses a barbell, for sensible defaults.
    const BARBELL_KEYWORDS = [
      'bankdrücken', 'schrägbank', 'kniebeug', 'kreuzheben',
      'rumänisch', 'vorgebeugt', 'schulterdrücken langhantel',
    ];
    const detectsBarbell = (name) => {
      const lower = (name || '').toLowerCase();
      // Excludes: Kurzhantel variants, machine-based exercises
      if (lower.includes('kurzhantel') || lower.includes(' kh') || lower.includes('kh ') || lower.endsWith(' kh')) return false;
      if (lower.includes('maschine')) return false;
      // 'Schulterdrücken' alone is ambiguous (KH or LH); auto-on only if explicitly LH
      if (lower.includes('schulterdrücken') && !lower.includes('langhantel')) return false;
      return BARBELL_KEYWORDS.some((kw) => lower.includes(kw));
    };

    // Resolve a template by key, applying user customisations if present
    function getTemplate(key, customTemplates) {
      const base = TEMPLATES[key];
      const custom = customTemplates && customTemplates[key];
      if (!custom) return base;
      return { ...base, ...custom };
    }

    const calcLevel = (xp) => Math.floor(Math.sqrt(xp / 100)) + 1;
    const xpForLevel = (lvl) => Math.pow(lvl - 1, 2) * 100;

    const getWeekStart = (date = new Date()) => {
      const d = new Date(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0, 0, 0, 0);
      return d.toISOString().slice(0, 10);
    };

    const formatDate = (iso) => new Date(iso).toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
    const formatDateLong = (iso) => new Date(iso).toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });
    const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

    function suggestNextSet(exercise, lastRecord, deloadMode = false) {
      const [minReps, maxReps] = exercise.repRange;
      if (!lastRecord) {
        return { weight: exercise.bodyweight ? 0 : null, reps: minReps,
                 hint: exercise.bodyweight ? 'Erst mit Körpergewicht starten' : 'Lockeres Startgewicht wählen' };
      }
      let weight = lastRecord.weight || 0;
      if (deloadMode && !exercise.bodyweight && weight > 0) {
        weight = Math.round((weight * 0.8) / 2.5) * 2.5;
      }
      if (lastRecord.weightUp && !deloadMode && !exercise.bodyweight) {
        return { weight: weight + 2.5, reps: minReps,
                 hint: 'Du wolltest +2,5 kg — neu starten bei ' + minReps + ' Wdh.' };
      }
      if (lastRecord.topReps >= maxReps) {
        return { weight: weight + 2.5, reps: minReps,
                 hint: deloadMode ? 'Deload: leichtes Gewicht' : `+2,5 kg, neu starten bei ${minReps} Wdh.` };
      }
      return { weight: weight, reps: Math.min(lastRecord.topReps + 1, maxReps),
               hint: deloadMode ? 'Deload-Modus aktiv' : `+1 Wdh. (zuletzt ${lastRecord.topReps})` };
    }

    const nextTemplateForPlan = (plan, sessionIndex, userPlans = {}) => {
      const def = resolvePlan(plan, userPlans);
      if (!def) return null;
      return def.days[sessionIndex % def.days.length];
    };

    function estimateWorkoutMinutes(template, restSeconds) {
      const exCount = template.exercises.length;
      const sets = template.exercises.reduce((s, e) => s + e.sets, 0);
      return Math.round((300 + exCount * 60 + sets * 35 + (sets - exCount) * restSeconds) / 60);
    }

    // ----- STATS HELPERS -----
    // Epley formula — estimates 1-rep-max from a working set, lets us
    // compare a 100kg×5 set fairly against a 80kg×10 set.
    const estimate1RM = (weight, reps) =>
      reps > 0 ? Math.round(weight * (1 + reps / 30) * 10) / 10 : 0;

    function getWeeklyFrequency(workouts, numWeeks) {
      const now = new Date();
      const weeks = [];
      for (let i = numWeeks - 1; i >= 0; i--) {
        const ref = new Date(now);
        ref.setDate(ref.getDate() - i * 7);
        weeks.push({ weekStart: getWeekStart(ref), count: 0 });
      }
      workouts.forEach((w) => {
        const wk = getWeekStart(new Date(w.date));
        const slot = weeks.find((s) => s.weekStart === wk);
        if (slot) slot.count++;
      });
      return weeks;
    }

    function getExerciseStats(workouts) {
      const stats = {};
      workouts.forEach((w) => {
        (w.exercises || []).forEach((ex) => {
          if (!ex.completedSets || ex.completedSets.length === 0) return;
          const workSets = ex.completedSets.filter(s => !s.warmup);
          if (workSets.length === 0) return;
          if (!stats[ex.name]) stats[ex.name] = { count: 0, totalSets: 0, totalVolume: 0, history: [] };
          stats[ex.name].count++;
          stats[ex.name].totalSets += workSets.length;
          // Best set = highest estimated 1RM that session (work sets only)
          const top = workSets.reduce(
            (b, s) => (estimate1RM(s.weight || 0, s.reps) > estimate1RM(b.weight || 0, b.reps) ? s : b),
            workSets[0]
          );
          const vol = workSets.reduce((s, set) => s + (set.weight || 0) * set.reps, 0);
          stats[ex.name].totalVolume += vol;
          stats[ex.name].history.push({
            date: w.date,
            weight: top.weight || 0,
            reps: top.reps,
            top1RM: estimate1RM(top.weight || 0, top.reps),
            volume: vol,
          });
        });
      });
      // Sort history chronologically inside each exercise
      Object.values(stats).forEach((s) => s.history.sort((a, b) => new Date(a.date) - new Date(b.date)));
      return stats;
    }

    // Predict future reps for a goal based on linear trend of best sets.
    // Only looks at bodyweight exercises (0-weight), like pull-ups.
    function predictRepsAtDate(exerciseName, workouts, futureDate) {
      const exStats = getExerciseStats(workouts);
      const hist = exStats[exerciseName]?.history || [];
      // Filter to bodyweight only (weight === 0)
      const bw = hist.filter((h) => h.weight === 0);
      if (bw.length < 2) return null; // Need at least 2 data points for trend
      
      const now = Date.now();
      const futureMs = new Date(futureDate).getTime();
      const daysToFuture = (futureMs - now) / (1000 * 60 * 60 * 24);
      
      const points = bw.map((h) => ({
        days: (new Date(h.date).getTime() - now) / (1000 * 60 * 60 * 24),
        reps: h.reps,
      }));
      
      // Linear fit: y = a + b*x
      const n = points.length;
      const sumX = points.reduce((s, p) => s + p.days, 0);
      const sumY = points.reduce((s, p) => s + p.reps, 0);
      const sumXY = points.reduce((s, p) => s + p.days * p.reps, 0);
      const sumX2 = points.reduce((s, p) => s + p.days * p.days, 0);
      
      const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
      const intercept = (sumY - slope * sumX) / n;
      
      return Math.max(0, Math.round(intercept + slope * daysToFuture));
    }

    // ========================================================================
    // INSIGHTS ENGINE — auto-generated training analysis
    // ========================================================================
    const INSIGHT_TYPES = { POSITIVE: 'positive', WARNING: 'warning', NEGATIVE: 'negative', INFO: 'info' };

    function generateInsights(state) {
      const insights = [];
      const workouts = state.workouts || [];
      if (workouts.length === 0) return insights;

      const planDef = resolvePlan(state.profile.plan, state.userPlans);
      const daysPerWeekTarget = planDef?.daysPerWeek || 3;

      // --- 1. CONSISTENCY (last 4 weeks) ---
      const weeks4 = getWeeklyFrequency(workouts, 4);
      const total4 = weeks4.reduce((s, w) => s + w.count, 0);
      const hitWeeks = weeks4.filter((w) => w.count >= daysPerWeekTarget).length;
      if (hitWeeks === 4) {
        insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'Trophy', title: 'Konstant wie ein Uhrwerk', body: `4 Wochen am Stück das Ziel (${daysPerWeekTarget}×) getroffen. Das ist der Schlüssel zu langfristigem Erfolg.` });
      } else if (hitWeeks === 0) {
        insights.push({ type: INSIGHT_TYPES.NEGATIVE, icon: 'AlertTriangle', title: 'Consistency bröckelt', body: `Keine einzige Woche mit ${daysPerWeekTarget} Workouts in den letzten 4 Wochen. Ein fester Trainingsrhythmus bringt mehr als sporadische Intensität.` });
      } else if (hitWeeks <= 2) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'Clock', title: 'Rhythmus finden', body: `Nur ${hitWeeks}/4 Wochen mit Ziel-Frequenz. Versuche feste Trainingstage zu blockieren.` });
      }

      // --- 2. VOLUME PROGRESSION (last 8 sessions) ---
      const last8 = workouts.slice(-8);
      if (last8.length >= 4) {
        const firstHalf = last8.slice(0, Math.floor(last8.length / 2));
        const secondHalf = last8.slice(Math.floor(last8.length / 2));
        const vol1 = firstHalf.reduce((s, w) => s + (w.totalVolume || 0), 0) / firstHalf.length;
        const vol2 = secondHalf.reduce((s, w) => s + (w.totalVolume || 0), 0) / secondHalf.length;
        const volDelta = vol1 > 0 ? ((vol2 - vol1) / vol1) * 100 : 0;
        if (volDelta > 10) {
          insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'TrendingUp', title: 'Volumen steigt', body: `Ø Volumen +${Math.round(volDelta)}% in den letzten ${last8.length} Sessions. Du baust systematisch auf.` });
        } else if (volDelta < -10) {
          insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'TrendingUp', title: 'Volumen sinkt', body: `Ø Volumen ${Math.round(volDelta)}% — prüfe ob Gewichte oder Sätze zurückgehen.` });
        } else if (last8.length >= 6) {
          insights.push({ type: INSIGHT_TYPES.INFO, icon: 'Activity', title: 'Volumen stabil', body: 'Keine große Volumen-Änderung. Zeit für Progressive Overload (+Gewicht oder +Reps)?' });
        }
      }

      // --- 3. STRENGTH PROGRESSION (top 5 exercises) ---
      const exStats = getExerciseStats(workouts);
      const exNames = Object.keys(exStats).sort((a, b) => exStats[b].count - exStats[a].count).slice(0, 5);
      let improving = 0, stagnating = 0;
      exNames.forEach((name) => {
        const hist = exStats[name].history;
        if (hist.length >= 3) {
          const first = hist[0].top1RM;
          const last = hist[hist.length - 1].top1RM;
          if (last > first * 1.03) improving++;
          else if (last <= first) stagnating++;
        }
      });
      if (improving >= 3) {
        insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'Zap', title: 'Kraft steigt', body: `${improving} deiner Top-Übungen zeigen messbare 1RM-Zuwächse. Keep going!` });
      } else if (stagnating >= 3 && workouts.length >= 10) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'AlertTriangle', title: 'Plateau-Gefahr', body: `${stagnating} Übungen stagnieren. Variation, mehr Volumen oder ein Deload könnten helfen.` });
      }

      // --- 4. MUSCLE GROUP BALANCE ---
      const muscleVol = {};
      workouts.forEach((w) => {
        w.exercises.forEach((ex) => {
          const cat = EXERCISE_LIBRARY.find((e) => e.name === ex.name)?.category || 'Sonstige';
          const vol = (ex.completedSets || []).filter(s => !s.warmup).reduce((s, set) => s + (set.weight || 0) * set.reps, 0);
          muscleVol[cat] = (muscleVol[cat] || 0) + vol;
        });
      });
      const totalMuscleVol = Object.values(muscleVol).reduce((s, v) => s + v, 0) || 1;
      const coreVol = (muscleVol['Hüfte/Rumpf'] || 0) + (muscleVol['Core'] || 0);
      const corePct = (coreVol / totalMuscleVol) * 100;
      if (corePct < 5 && totalMuscleVol > 10000) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'Activity', title: 'Core unterrepräsentiert', body: `Nur ${corePct.toFixed(1)}% deines Volumens fließt in Core/Hüfte. Rumpfstabilität hilft bei allen großen Übungen.` });
      }
      const legVol = (muscleVol['Beine'] || 0) + (muscleVol['Hüfte/Rumpf'] || 0) * 0.5;
      const legPct = (legVol / totalMuscleVol) * 100;
      if (legPct < 25 && totalMuscleVol > 10000) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'Activity', title: 'Leg-Day vernachlässigt?', body: `Beine machen nur ~${legPct.toFixed(0)}% deines Volumens aus. Don't skip leg day!` });
      }

      // --- 5. EFFICIENCY ---
      if (workouts.length >= 3) {
        const avgDur = workouts.reduce((s, w) => s + (w.durationMin || 0), 0) / workouts.length;
        if (avgDur > 75) {
          insights.push({ type: INSIGHT_TYPES.INFO, icon: 'Clock', title: 'Lange Sessions', body: `Ø ${Math.round(avgDur)} min — das ist okay, aber kürzere, intensivere Workouts sparen Zeit und Recovery.` });
        } else if (avgDur < 35) {
          insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'Clock', title: 'Sehr kurze Sessions', body: `Ø nur ${Math.round(avgDur)} min. Genug Sätze und Aufwärmung eingebaut?` });
        }
      }

      // --- 6. PR-RATE ---
      const prRate = workouts.filter((w) => {
        return w.exercises.some((ex) => {
          const rec = state.exerciseRecords[ex.name];
          if (!rec || !ex.completedSets) return false;
          const ws = ex.completedSets.filter(s => !s.warmup);
          if (ws.length === 0) return false;
          const top = ws.reduce((b, s) => (s.reps > b.reps ? s : b), ws[0]);
          return top.reps >= rec.topReps && top.weight >= rec.weight;
        });
      }).length;
      if (workouts.length >= 8 && prRate === 0) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'AlertTriangle', title: 'PR-Dürre', body: '8 Sessions ohne neuen PR. Das ist normal — aber ein Deload oder mehr Schlaf könnten helfen.' });
      } else if (workouts.length >= 4 && prRate >= 3) {
        insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'Trophy', title: 'PR-Maschine', body: `${prRate} PRs in den letzten Sessions! Du bist in einem starken Zyklus.` });
      }

      // --- 7. BODYWEIGHT vs STRENGTH ---
      const bw = state.bodyWeight || [];
      if (bw.length >= 2 && exNames.length > 0) {
        const firstBW = bw[0].kg;
        const lastBW = bw[bw.length - 1].kg;
        const bwDelta = firstBW > 0 ? ((lastBW - firstBW) / firstBW) * 100 : 0;
        // find a non-bw exercise for relative strength proxy
        const nonBwEx = exNames.find((n) => exStats[n].history.length >= 2 && exStats[n].history[0].weight > 0);
        if (nonBwEx) {
          const hist = exStats[nonBwEx].history;
          const first1RM = hist[0].top1RM;
          const last1RM = hist[hist.length - 1].top1RM;
          const strengthDelta = first1RM > 0 ? ((last1RM - first1RM) / first1RM) * 100 : 0;
          if (bwDelta < -3 && strengthDelta > 0) {
            insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'TrendingUp', title: 'Relative Kraft steigt', body: `Körpergewicht -${Math.abs(bwDelta).toFixed(1)}%, aber ${nonBwEx} 1RM +${strengthDelta.toFixed(0)}%. Effizienter Körper!` });
          } else if (bwDelta > 3 && strengthDelta < 0) {
            insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'TrendingUp', title: 'Kraft pro KG sinkt', body: `Gewicht +${bwDelta.toFixed(1)}%, aber ${nonBwEx} stagniert. Focus auf Bodyrecomposition?` });
          }
        }
      }

      // --- 8. GOAL PROGRESS ---
      Object.entries(state.goals || {}).forEach(([name, goal]) => {
        const progress = Math.min(100, (goal.current / goal.target) * 100);
        if (progress >= 100) {
          insights.push({ type: INSIGHT_TYPES.POSITIVE, icon: 'Check', title: `Ziel erreicht: ${name}`, body: `${goal.current} / ${goal.target} — Glückwunsch! Neues Ziel setzen?` });
        } else if (progress >= 75) {
          insights.push({ type: INSIGHT_TYPES.INFO, icon: 'Zap', title: `${name} fast geschafft`, body: `${Math.round(progress)}% erreicht. Nur noch ${goal.target - goal.current} Einheiten.` });
        }
      });

      // --- 9. WARMUP HABITS ---
      const recentW = workouts.slice(-5);
      const warmupCount = recentW.reduce((s, w) => s + w.exercises.reduce((e, ex) => e + (ex.completedSets || []).filter(set => set.warmup).length, 0), 0);
      const totalSetsRecent = recentW.reduce((s, w) => s + w.exercises.reduce((e, ex) => e + (ex.completedSets || []).length, 0), 0);
      if (totalSetsRecent > 0 && (warmupCount / totalSetsRecent) < 0.1) {
        insights.push({ type: INSIGHT_TYPES.WARNING, icon: 'Flame', title: 'Warm-up Mangel', body: `Nur ${Math.round((warmupCount/totalSetsRecent)*100)}% Warmup-Sets in den letzten 5 Sessions. Deine Gelenke werden es dir danken.` });
      }

      // --- 10. CARDIO HABITS ---
      const cardioCount = workouts.reduce((s, w) => s + (w.exercises || []).filter((ex) => ex.completedSets && ex.completedSets.some((set) => set.meters || set.reps > 0)).filter((ex) => EXERCISE_LIBRARY.find((e) => e.name === ex.name)?.cardio).length, 0);
      if (workouts.length > 10 && cardioCount === 0) {
        insights.push({ type: INSIGHT_TYPES.INFO, icon: 'Activity', title: 'Cardio vergessen?', body: 'Keine Cardio-Einheiten in den letzten Sessions. 1–2×/Woche schützt Herz und Recovery.' });
      }

      return insights;
    }

    // ----- CHART COMPONENTS -----
    const BarChart = ({ data, target, getColor, height = 'h-32', viewH = 60 }) => {
      const max = Math.max(target ? target + 1 : 1, ...data.map((d) => d.count || 0));
      const W = 100, padX = 1, gapPct = 0.2;
      const barW = (W - padX * 2) / data.length;
      const targetY = target ? viewH - 4 - (target / max) * (viewH - 8) : null;
      return (
        <svg viewBox={`0 0 ${W} ${viewH}`} preserveAspectRatio="none" className={`w-full ${height}`}>
          {target != null && (
            <>
              <line x1={padX} x2={W - padX} y1={targetY} y2={targetY}
                stroke="rgba(190,242,100,0.4)" strokeWidth="0.3" strokeDasharray="1.2 0.8" />
            </>
          )}
          {data.map((d, i) => {
            const v = d.count || 0;
            const barH = (v / max) * (viewH - 4);
            const color = getColor ? getColor(d, i) : (target && v >= target ? '#bef264' : 'rgba(190,242,100,0.3)');
            return (
              <rect key={i}
                x={padX + i * barW + barW * (gapPct / 2)}
                y={viewH - barH - 0.5}
                width={barW * (1 - gapPct)}
                height={Math.max(0.5, barH)}
                fill={color} rx="0.4" />
            );
          })}
        </svg>
      );
    };

    const LineChart = ({ points, height = 'h-40', viewH = 60, isCardio = false, isBodyweight = false }) => {
      if (!points || points.length === 0) {
        return <div className="text-gray-500 text-sm py-10 text-center">Noch keine Daten für diese Übung</div>;
      }
      const [tooltip, setTooltip] = useState(null);
      const W = 100, padX = 3, padTop = 8, padBot = 6;
      const ys = points.map((p) => p.y);
      const maxY = Math.max(...ys);
      const minY = Math.min(...ys);
      const range = Math.max(0.1, maxY - minY);
      const xStep = points.length > 1 ? (W - padX * 2) / (points.length - 1) : 0;
      const coords = points.map((p, i) => ({
        x: padX + i * xStep,
        y: viewH - padBot - ((p.y - minY) / range) * (viewH - padTop - padBot),
        data: p,
      }));
      const linePath = coords.map((c, i) => `${i === 0 ? 'M' : 'L'} ${c.x} ${c.y}`).join(' ');
      const fillPath = points.length > 1
        ? `${linePath} L ${coords[coords.length - 1].x} ${viewH} L ${coords[0].x} ${viewH} Z`
        : '';

      const handlePointEnter = (e, point) => {
        const rect = e.target.closest('svg').getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        setTooltip({ x, y, point });
      };

      const handlePointLeave = () => {
        setTooltip(null);
      };

      const formatTooltip = (point) => {
        const date = point.date ? new Date(point.date).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' }) : '';
        if (isCardio) {
          return `${date}\nStufe ${point.weight} · ${point.reps}min`;
        }
        if (isBodyweight) {
          return `${date}\n${point.reps} Wdh.`;
        }
        return `${date}\n${point.weight}kg × ${point.reps}`;
      };

      return (
        <div className="relative w-full">
          <svg viewBox={`0 0 ${W} ${viewH}`} preserveAspectRatio="none" className={`w-full ${height}`}>
            {points.length > 1 && <path d={fillPath} fill="rgba(190,242,100,0.12)" />}
            {points.length > 1 && (
              <path d={linePath} fill="none" stroke="#bef264" strokeWidth="0.6"
                strokeLinecap="round" strokeLinejoin="round" />
            )}
            {coords.map((c, i) => (
              <circle
                key={i}
                cx={c.x} cy={c.y} r={points.length === 1 ? 1.5 : 0.9}
                fill="#bef264" stroke="#09090b" strokeWidth="0.3"
                className="cursor-pointer hover:r-2 transition-all"
                onMouseEnter={(e) => handlePointEnter(e, c.data)}
                onMouseLeave={handlePointLeave}
                onTouchStart={() => setTooltip({ x: c.x, y: c.y, point: c.data })}
                onTouchEnd={() => setTooltip(null)}
              />
            ))}
          </svg>
          {tooltip && (
            <div
              className="absolute pointer-events-none z-10 bg-gray-900 text-white text-xs rounded-lg px-2.5 py-1.5 shadow-lg whitespace-pre-line font-mono-num"
              style={{
                left: Math.min(tooltip.x + 10, tooltip.x),
                top: Math.max(tooltip.y - 40, 0),
                transform: tooltip.x > 200 ? 'translateX(-100%)' : 'none',
              }}
            >
              {formatTooltip(tooltip.point)}
            </div>
          )}
        </div>
      );
    };

    // ========================================================================
    // SHARED COMPONENTS
    // ========================================================================
    const StatChip = ({ icon: IconCmp, label, value, accent = false }) => (
      <div className={`flex-1 rounded-2xl border p-3 ${accent ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-900'}`}>
        <div className="flex items-center gap-1.5 text-xs uppercase tracking-wider opacity-70 mb-1">
          <IconCmp size={12} strokeWidth={2.5} />
          <span>{label}</span>
        </div>
        <div className="font-display text-3xl">{value}</div>
      </div>
    );

    const BottomNav = ({ active, setView, hasHistory }) => {
      const items = [
        { key: 'dashboard', label: 'Start',      icon: Icon.Dumbbell },
        { key: 'activity',  label: 'Aktivität',  icon: Icon.Footprints },
        { key: 'stats',     label: 'Stats',      icon: Icon.BarChart3 },

        { key: 'settings',  label: 'Setup',      icon: Icon.Settings },

      return (
        <div className="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur border-t border-gray-200 px-3 pt-2 fixed-bottom-nav flex z-30">
          {items.map(({ key, label, icon: IconCmp, disabled }) => (
            <button key={key} onClick={() => !disabled && setView(key)} disabled={disabled}
              className={`flex-1 flex flex-col items-center gap-0.5 py-2 ${active === key ? 'text-emerald-700' : disabled ? 'text-gray-300' : 'text-gray-500'}`}>
              <IconCmp size={20} strokeWidth={2} />
              <span className="text-[10px] uppercase tracking-wider font-medium">{label}</span>
            </button>
          ))}

    const Section = ({ title, children }) => (
      <div>

        {children}

    // ========================================================================

    // ========================================================================
    const SplashScreen = () => (
      <div className="min-h-screen bg-white flex flex-col items-center justify-center text-emerald-700">
        <Icon.Dumbbell size={56} strokeWidth={2.5} className="animate-pulse" />
        <div className="mt-4 font-display text-4xl tracking-wider text-gray-900">IRONBLOCK</div>
        <div className="text-xs uppercase tracking-[0.3em] text-gray-500 mt-1">Lade Training…</div>
      </div>
    );

    // ========================================================================
    // DASHBOARD
    // ========================================================================
    // Returns the most recent PR: { name, value, date, isBodyweight }
    function getRecentPR(workouts, exerciseRecords) {
      if (!workouts || workouts.length === 0) return null;
      const lastWorkout = workouts[workouts.length - 1];
      let bestPR = null;
      (lastWorkout.exercises || []).forEach(ex => {
        const exIsCardio = isCardioExercise(ex.name);
        (ex.completedSets || []).forEach(set => {
          const rec = exerciseRecords[ex.name];
          if (!rec) return;
          const isBW = set.weight === 0;
          if (exIsCardio) {
            if (set.reps >= rec.topReps) {
              if (!bestPR || set.reps > bestPR.value) {
                bestPR = { name: ex.name, value: set.reps, unit: 'min', date: lastWorkout.date, isBodyweight: false, isCardio: true };
              }
            }
          } else if (isBW && set.reps >= rec.topReps) {
            if (!bestPR || set.reps > bestPR.value) {
              bestPR = { name: ex.name, value: set.reps, unit: 'Wdh.', date: lastWorkout.date, isBodyweight: true };
            }
          } else if (!isBW && set.weight >= rec.weight) {
            if (!bestPR || set.weight > bestPR.value) {
              bestPR = { name: ex.name, value: set.weight, unit: 'kg', date: lastWorkout.date, isBodyweight: false };
            }
          }
        });
      });
      if (!bestPR && exerciseRecords) {
        const entries = Object.entries(exerciseRecords);
        if (entries.length > 0) {
          const [name, rec] = entries.sort((a, b) => new Date(b[1].date) - new Date(a[1].date))[0];
          const recIsCardio = isCardioExercise(name);
          bestPR = { name, value: rec.weight === 0 && !recIsCardio ? rec.topReps : rec.weight, unit: rec.weight === 0 && !recIsCardio ? 'Wdh.' : recIsCardio ? 'min' : 'kg', date: rec.date, isBodyweight: rec.weight === 0 && !recIsCardio, isCardio: recIsCardio };
        }
      }
      return bestPR;
    }

    const Dashboard = ({ state, persist, setView }) => {
      const planDef = resolvePlan(state.profile.plan, state.userPlans);
      const planDays = (planDef?.days || []).map((dayOrKey, idx) => {
        if (state.userPlans?.[state.profile.plan]) {
          return dayOrKey;
        }
        return getTemplate(dayOrKey, state.customTemplates);
      }).filter(Boolean);
      const level = calcLevel(state.stats.totalXP);
      const xpCurrent = state.stats.totalXP - xpForLevel(level);
      const xpNeeded = xpForLevel(level + 1) - xpForLevel(level);
      const xpPercent = Math.min(100, (xpCurrent / xpNeeded) * 100);
      const weekTarget = planDef.daysPerWeek;
      const weekProgress = Math.min(state.stats.sessionsThisWeek, weekTarget);

      // Körpergewicht
      const [showBWInput, setShowBWInput] = useState(false);
      const [bwInput, setBwInput] = useState('');
      const bwEntries = (state.bodyWeight || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
      const latestBW = bwEntries[bwEntries.length - 1];
      const prevBW = bwEntries[bwEntries.length - 2];
      const bwDelta = latestBW && prevBW ? (latestBW.kg - prevBW.kg) : null;
      const todayStr = new Date().toISOString().slice(0, 10);
      const todayEntryExists = bwEntries.some(e => e.date === todayStr);

      const logBodyWeight = () => {
        const kg = parseFloat(bwInput.replace(',', '.'));
        if (isNaN(kg) || kg < 20 || kg > 300) return;
        const entries = (state.bodyWeight || []).filter(e => e.date !== todayStr);
        persist({ ...state, bodyWeight: [...entries, { date: todayStr, kg }] });
        setShowBWInput(false);
        setBwInput('');
      };

      // PRs
      const recentPR = getRecentPR(state.workouts, state.exerciseRecords);
      // All-time top PRs (top 3 by date)
      const allPRs = Object.entries(state.exerciseRecords || {})
        .map(([name, rec]) => ({ name, ...rec }))
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 3);

      const startWorkout = (dayIndex) => {
        try {
          const tmpl = resolveTemplate(state.profile.plan, dayIndex, state.userPlans, state.customTemplates);
          if (!tmpl || !tmpl.exercises) {
            alert('Fehler: Template nicht gefunden.\nPlan: ' + state.profile.plan + '\nTag: ' + dayIndex);
            return;
          }
          const prefs = state.barbellPrefs || {};
          const templateKey = state.userPlans?.[state.profile.plan]
            ? `${state.profile.plan}_day${dayIndex % (state.userPlans[state.profile.plan].days.length)}`
            : (PLAN_DEFS[state.profile.plan]?.days[dayIndex % PLAN_DEFS[state.profile.plan].days.length] || state.profile.plan);
          const aw = {
            startedAt: new Date().toISOString(),
            templateKey, templateName: tmpl.name || tmpl.code || '?', templateCode: tmpl.code || '?',
            currentExerciseIndex: 0, restEndsAt: null,
            exercises: tmpl.exercises.map((ex) => ({
              ...ex,
              repRange: ex.repRange || [8, 12],
              completedSets: [],
              useBarbell: prefs[ex.name] !== undefined ? prefs[ex.name] : detectsBarbell(ex.name),
              barWeight: 20,
            })),
          };
          persist({ ...state, activeWorkout: aw });
        } catch(e) {
          alert('Start-Fehler: ' + e.message + '\n\nPlan: ' + state.profile.plan + '\nCustomTemplates: ' + JSON.stringify(Object.keys(state.customTemplates || {})));
        }
      };


      // ── Weekly / Monthly Report ───────────────────────────────────────────
      const [report, setReport]           = useState(null);  // { type, text, generatedAt }
      const [reportLoading, setReportLoading] = useState(false);
      const [reportOpen, setReportOpen]   = useState(false);

      const shouldShowReport = useMemo(() => {
        const now = new Date();
        const isMonday = now.getDay() === 1;
        const isFirstOfMonth = now.getDate() === 1;
        const isReportDay = isMonday || isFirstOfMonth;
        if (!isReportDay) return null;
        const type = isFirstOfMonth ? 'monthly' : 'weekly';
        // Only show once per day
        if (report?.generatedAt?.slice(0, 10) === todayStr && report?.type === type) return null;
        if (state.workouts.length === 0) return null;
        return type;
      }, [todayStr, report]);

      const generateReport = async (type) => {
        setReportLoading(true);
        setReportOpen(true);

        const now = new Date();
        const cutoff = type === 'weekly'
          ? new Date(now - 7 * 86400000)
          : new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const cutoffEnd = type === 'monthly'
          ? new Date(now.getFullYear(), now.getMonth(), 1)
          : now;

        const periodWorkouts = state.workouts.filter(w => {
          const d = new Date(w.date);
          return d >= cutoff && d <= cutoffEnd;
        });
        const periodActivities = (state.activities || []).filter(a => {
          const d = new Date(a.date);
          return d >= cutoff && d <= cutoffEnd;
        });
        const goals = Object.entries(state.goals || {}).map(([name, g]) => ({
          name, current: g.current, target: g.target, unit: g.unit, targetDate: g.targetDate,
        }));

        const prompt = `Du bist ein persönlicher Fitness-Coach. Analysiere die Trainingsdaten und gib einen ${type === 'weekly' ? 'Wochenreport (letzte 7 Tage)' : 'Monatsreport (letzter Monat)'} auf Deutsch.

TRAININGSDATEN (${type === 'weekly' ? 'letzte 7 Tage' : 'letzter Monat'}):
Krafttraining: ${periodWorkouts.length} Einheiten
${periodWorkouts.map(w => `- ${w.templateName}: ${w.setsCompleted} Sätze, ${w.totalVolume}kg Volumen, ${w.durationMin}min${w.note ? `, Notiz: "${w.note}"` : ''}`).join('\n')}

Aktivitäten: ${periodActivities.length} Einheiten
${periodActivities.map(a => `- ${a.activityType === 'jogging' ? 'Joggen' : 'Tennis'}: ${a.durationMin}min${a.km ? `, ${a.km}km` : ''}${a.bpm ? `, ${a.bpm}bpm` : ''}`).join('\n')}

PERSÖNLICHE ZIELE:
${goals.length > 0 ? goals.map(g => `- ${g.name}: aktuell ${g.current}${g.unit}, Ziel ${g.target}${g.unit} bis ${g.targetDate}`).join('\n') : 'Keine Ziele gesetzt'}

Erstelle einen strukturierten Report mit:
1. **Zusammenfassung** – Was wurde diese ${type === 'weekly' ? 'Woche' : 'Monat'} geleistet?
2. **Highlights** – Was lief besonders gut?
3. **Ziel-Check** – Fortschritt zu den gesetzten Zielen (falls vorhanden)
4. **Tipps pro Übung** – Konkrete Verbesserungsvorschläge für die trainierten Übungen
5. **Fokus für ${type === 'weekly' ? 'nächste Woche' : 'nächsten Monat'}** – 2-3 konkrete Empfehlungen

Sei direkt, motivierend und spezifisch. Kein allgemeines Blabla.`;

        try {
          const apiKey = localStorage.getItem('ironblock_anthropic_key') || '';
          if (!apiKey) {
            setReport({ type, text: '⚠️ Kein API-Key hinterlegt. Bitte trage deinen Anthropic API-Key in den Einstellungen ein.', generatedAt: new Date().toISOString() });
            setReportLoading(false);
            return;
          }
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1000,
              messages: [{ role: 'user', content: prompt }],
            }),
          });
          const data = await res.json();
          const text = data.content?.find(b => b.type === 'text')?.text || 'Fehler beim Generieren.';
          const newReport = { type, text, generatedAt: new Date().toISOString() };
          setReport(newReport);
          persist({ ...state, lastReport: newReport });
        } catch {
          setReport({ type, text: 'Verbindungsfehler. Bitte versuche es erneut.', generatedAt: new Date().toISOString() });
        }
        setReportLoading(false);
      };

      // Auto-open report modal on report days if not yet generated today
      useEffect(() => {
        if (shouldShowReport && !report) {
          const saved = state.lastReport;
          if (saved?.generatedAt?.slice(0, 10) === todayStr && saved?.type === shouldShowReport) {
            setReport(saved);
            setReportOpen(true);
          }
        }
      }, [shouldShowReport]);

      return (
        <div className="min-h-screen pb-28 relative grain">
          <div className="px-5 pt-6 pb-4 flex items-end justify-between">
            <div>
              <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Ironblock</div>
              <div className="font-display text-5xl text-emerald-700 mt-1">LIFT.<span className="text-gray-900">LOG.</span><span className="text-gray-500">GROW.</span></div>
              {state.vacationUntil && new Date(state.vacationUntil) >= new Date() && (
                <div className="mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-blue-50 border border-blue-200 text-blue-700 text-xs font-medium">
                  <Icon.Clock size={12} /> Urlaub bis {new Date(state.vacationUntil).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' })}
                </div>
              )}
              {state.deloadMode && (
                <div className="mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-amber-50 border border-amber-200 text-amber-700 text-xs font-medium">
                  <Icon.Activity size={12} /> Deload-Modus aktiv
                </div>
              )}
            </div>
            <button onClick={() => setView('settings')} className="text-gray-500 hover:text-gray-800 transition p-2 -mr-2">
              <Icon.Settings size={22} />
            </button>
          </div>

          <div className="px-5 mt-2 flex gap-3">
            <StatChip icon={Icon.Flame} label="Streak" value={state.stats.streak} />
            <StatChip icon={Icon.Trophy} label="Level" value={level} accent />
            <StatChip icon={Icon.Zap} label="Workouts" value={state.workouts.length} />
          </div>

          <div className="px-5 mt-3">
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
              <div className="flex items-baseline justify-between mb-2">
                <div className="text-xs uppercase tracking-wider text-gray-500">LVL {level} → {level + 1}</div>
                <div className="font-mono-num text-xs text-gray-600">{xpCurrent} / {xpNeeded} XP</div>
              </div>
              <div className="h-2 rounded-full bg-gray-100 overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-700" style={{ width: `${xpPercent}%` }} />
              </div>
            </div>
          </div>

          <div className="px-5 mt-3">
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
              <div className="flex items-baseline justify-between mb-3">
                <div className="text-xs uppercase tracking-wider text-gray-500">Diese Woche</div>

          <div className="px-5 mt-4">

              {planDays.map((tmpl, idx) => {

                        <div className="min-w-0">
                          <div className="font-semibold text-gray-900 text-sm">{tmpl.name}</div>

                        <Icon.Play size={14} /> Starten
                      </button>
                    </div>
                    <div className="mt-2 flex flex-wrap gap-1.5">
                      {tmpl.exercises.slice(0, 4).map((ex, i) => (
                        <span key={i} className="text-[10px] text-gray-500 bg-white border border-gray-200 rounded-lg px-2 py-0.5">{ex.name}</span>
                      ))}

                      )}
                    </div>
                  </div>

            </div>
          </div>

          {state.workouts.length >= 3 && (
            <div className="px-5 mt-4">
              <button onClick={() => setView('insights')}
                className="w-full rounded-2xl bg-gray-50 border border-gray-200 p-4 flex items-center gap-3 active:bg-gray-100 transition text-left">
                <div className="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center text-emerald-700">
                  <Icon.Activity size={20} strokeWidth={2} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-gray-900 text-sm">Training analysieren</div>
                  <div className="text-xs text-gray-500">Erkenntnisse zu Fortschritt, Schwächen & Optimierung</div>
                </div>
                <Icon.ArrowRight size={16} className="text-gray-400" />
              </button>
            </div>
          )}

          {/* Körpergewicht */}
          <div className="px-5 mt-4">
            <div className="flex items-baseline justify-between mb-2 px-1">
              <div className="text-xs uppercase tracking-[0.25em] text-gray-500">Körpergewicht</div>
              <button onClick={() => setShowBWInput(true)} className="text-xs text-emerald-700 font-medium flex items-center gap-1 bg-emerald-50 border border-emerald-200 px-3 py-1.5 rounded-full active:bg-emerald-100 transition">
                <Icon.Plus size={12} strokeWidth={3} /> Eintragen
              </button>
            </div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
              {bwEntries.length === 0 ? (
                <div className="text-center py-3">
                  <div className="text-sm text-gray-500 mb-3">Noch keine Einträge</div>
                  <button onClick={() => setShowBWInput(true)}
                    className="px-4 py-2 rounded-xl bg-emerald-100 border border-emerald-300 text-emerald-800 text-sm font-medium">
                    Erstes Gewicht eintragen
                  </button>
                </div>
              ) : (
                <>
                  <div className="flex items-baseline justify-between mb-3">
                    <div>
                      <div className="font-mono-num font-bold text-3xl text-gray-900">{latestBW.kg} <span className="text-sm font-normal text-gray-500">kg</span></div>
                      <div className="text-[11px] text-gray-400 mt-0.5">{new Date(latestBW.date).toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'long' })}</div>
                      {bwDelta !== null && (
                        <div className={`text-xs font-mono-num mt-0.5 ${bwDelta < 0 ? 'text-emerald-600' : bwDelta > 0 ? 'text-red-400' : 'text-gray-400'}`}>
                          {bwDelta > 0 ? '+' : ''}{bwDelta.toFixed(1)} kg vs. letztes Mal
                        </div>
                      )}
                    </div>
                    <div className="text-right">
                      <div className="text-[10px] text-gray-400">{bwEntries.length} Einträge</div>
                      {bwEntries.length >= 2 && (
                        <div className="text-[10px] text-gray-400 mt-0.5">
                          Ø {(bwEntries.reduce((s, e) => s + e.kg, 0) / bwEntries.length).toFixed(1)} kg
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Mini chart */}
                  {bwEntries.length >= 2 && (() => {
                    const vals = bwEntries.map(e => e.kg);
                    const minV = Math.min(...vals) - 1;
                    const maxV = Math.max(...vals) + 1;
                    const W = 100, H = 40, pad = 4;
                    const px = (_, i) => pad + (i / (vals.length - 1)) * (W - pad * 2);
                    const py = v => H - pad - ((v - minV) / (maxV - minV)) * (H - pad * 2);
                    const d = vals.map((v, i) => `${i === 0 ? 'M' : 'L'}${px(null, i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
                    return (
                      <div className="h-10 mt-1">
                        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full">
                          <path d={`${d} L${px(null,vals.length-1).toFixed(1)},${H-pad} L${pad},${H-pad} Z`} fill="#10b981" fillOpacity="0.1"/>
                          <path d={d} fill="none" stroke="#10b981" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                          <circle cx={px(null,vals.length-1)} cy={py(vals[vals.length-1])} r="2" fill="#10b981"/>
                        </svg>
                      </div>
                    );
                  })()}
                  {/* Last 3 entries */}
                  <div className="flex gap-2 mt-3">
                    {bwEntries.slice(-3).reverse().map((e, i) => (
                      <div key={e.date} className={`flex-1 rounded-xl p-2 text-center ${i === 0 ? 'bg-emerald-50 border border-emerald-200' : 'bg-white border border-gray-200'}`}>
                        <div className={`font-mono-num font-bold text-sm ${i === 0 ? 'text-emerald-700' : 'text-gray-700'}`}>{e.kg}</div>
                        <div className="text-[9px] text-gray-400 mt-0.5">{new Date(e.date).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' })}</div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>

          {/* PRs */}
          {allPRs.length > 0 && (
            <div className="px-5 mt-5">
              <div className="flex items-baseline justify-between mb-2 px-1">
                <div className="text-xs uppercase tracking-[0.25em] text-gray-500">Persönliche Rekorde</div>
                <button onClick={() => setView('stats')} className="text-xs text-emerald-700 flex items-center gap-1">
                  Alle <Icon.ArrowRight size={12} />
                </button>
              </div>
              <div className="space-y-2">
                {allPRs.map((pr, i) => {
                  const isBW = pr.weight === 0;
                  const prIsCardio = isCardioExercise(pr.name);
                  const isNew = pr.date === state.workouts[state.workouts.length - 1]?.date;
                  return (
                    <div key={pr.name} className={`rounded-2xl border p-3 flex items-center gap-3 ${isNew ? 'bg-amber-50 border-amber-300' : 'bg-gray-50 border-gray-200'}`}>
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm font-display ${isNew ? 'bg-amber-200 text-amber-900' : 'bg-gray-200 text-gray-500'}`}>
                        {i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-gray-900 text-sm truncate">{pr.name}</div>
                        <div className="text-[10px] text-gray-500">{formatDateLong(pr.date)}{isNew ? ' · 🎉 Neuer PR!' : ''}</div>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <div className={`font-mono-num font-bold ${isNew ? 'text-amber-700' : 'text-emerald-700'}`}>
                          {prIsCardio ? `${pr.weight} Stufe` : isBW ? `${pr.topReps} Wdh.` : `${pr.weight} kg`}
                        </div>

                      </div>

            </div>
