                  <div className="text-center mb-4">
                    <div className="text-xs uppercase tracking-[0.3em] text-gray-500">{isCardio ? 'Einheit bearbeiten' : 'Satz bearbeiten'}</div>
                    <div className="font-display text-2xl text-gray-900 mt-1">{ex.name} · {isCardio ? 'Einheit' : 'Satz'} {editSetModal.setIdx + 1}</div>
                  </div>
                  <div className="mb-5">
                    {isCardio ? (
                      <div className={`grid gap-3 ${ex.name === 'Rudermaschine' ? 'grid-cols-3' : 'grid-cols-2'}`}>
                        <div className="rounded-2xl bg-gray-50 border border-gray-200 p-2">
                          <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">Minuten</div>
                          <div className="flex items-center justify-between gap-1">
                            <button onClick={() => setEditSetModal({ ...editSetModal, reps: Math.max(1, editSetModal.reps - 1) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Minus size={14} strokeWidth={3} /></button>
                            <span className="font-mono-num text-xl font-bold text-gray-900">{editSetModal.reps}</span>
                            <button onClick={() => setEditSetModal({ ...editSetModal, reps: editSetModal.reps + 1 })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Plus size={14} strokeWidth={3} /></button>
                          </div>
                        </div>
                        {ex.name === 'Rudermaschine' && (
                          <div className="rounded-2xl bg-gray-50 border border-gray-200 p-2">
                            <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">Stufe</div>
                            <div className="flex items-center justify-between gap-1">
                              <button onClick={() => setEditSetModal({ ...editSetModal, weight: Math.max(1, editSetModal.weight - 1) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Minus size={14} strokeWidth={3} /></button>
                              <span className="font-mono-num text-xl font-bold text-gray-900">{editSetModal.weight}</span>
                              <button onClick={() => setEditSetModal({ ...editSetModal, weight: Math.min(10, editSetModal.weight + 1) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Plus size={14} strokeWidth={3} /></button>
                            </div>
                          </div>
                        )}
                        <div className="rounded-2xl bg-gray-50 border border-gray-200 p-2">
                          <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">Meter</div>
                          <div className="flex items-center justify-between gap-1">
                            <button onClick={() => setEditSetModal({ ...editSetModal, meters: Math.max(100, (editSetModal.meters || 0) - 100) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Minus size={14} strokeWidth={3} /></button>
                            <span className="font-mono-num text-xl font-bold text-gray-900">{editSetModal.meters || 0}</span>
                            <button onClick={() => setEditSetModal({ ...editSetModal, meters: (editSetModal.meters || 0) + 100 })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Plus size={14} strokeWidth={3} /></button>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 gap-3">
                        <div className="rounded-2xl bg-gray-50 border border-gray-200 p-2">
                          <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">Gewicht</div>
                          <div className="flex items-center justify-between gap-1">
                            <button onClick={() => setEditSetModal({ ...editSetModal, weight: Math.max(0, +(editSetModal.weight - 2.5).toFixed(2)) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Minus size={14} strokeWidth={3} /></button>
                            <span className="font-mono-num text-xl font-bold text-gray-900">{editSetModal.weight}</span>
                            <button onClick={() => setEditSetModal({ ...editSetModal, weight: +(editSetModal.weight + 2.5).toFixed(2) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Plus size={14} strokeWidth={3} /></button>
                          </div>
                        </div>
                        <div className="rounded-2xl bg-gray-50 border border-gray-200 p-2">
                          <div className="text-[10px] uppercase tracking-wider text-gray-500 text-center mb-1">Wdh.</div>
                          <div className="flex items-center justify-between gap-1">
                            <button onClick={() => setEditSetModal({ ...editSetModal, reps: Math.max(0, editSetModal.reps - 1) })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Minus size={14} strokeWidth={3} /></button>
                            <span className="font-mono-num text-xl font-bold text-gray-900">{editSetModal.reps}</span>
                            <button onClick={() => setEditSetModal({ ...editSetModal, reps: editSetModal.reps + 1 })} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-800 flex items-center justify-center"><Icon.Plus size={14} strokeWidth={3} /></button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                  {!isCardio && (
                    <button onClick={() => setEditSetModal({ ...editSetModal, warmup: !editSetModal.warmup })}
                      className={`w-full py-2.5 rounded-xl border text-sm font-medium flex items-center justify-center gap-2 mb-4 transition ${editSetModal.warmup ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                      <div className={`w-4 h-4 rounded border flex items-center justify-center transition ${editSetModal.warmup ? 'bg-amber-400 border-amber-400' : 'border-gray-400'}`}>
                        {editSetModal.warmup && <Icon.Check size={10} strokeWidth={3} className="text-white" />}
                      </div>
                      {editSetModal.warmup ? 'Warm-up Satz' : 'Als Warm-up markieren'}
                    </button>
                  )}
                  <div className="flex gap-2">
                    <button onClick={() => setEditSetModal(null)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Abbrechen</button>
                    <button onClick={saveSetEdit} disabled={editSetModal.reps === 0}
                      className="flex-1 py-3 rounded-xl bg-emerald-500 disabled:bg-gray-200 text-white disabled:text-gray-400 font-bold">Speichern</button>
                  </div>
                </div>
              </div>
            );
          })()}

          <BottomNav active="history" setView={setView} hasHistory={state.workouts.length > 0} />
        </div>
      );
    };

    // ========================================================================
    // STATS
    // ========================================================================
    const StatsView = ({ state, persist, setView }) => {
      const workouts = state.workouts;
      const planDef = resolvePlan(state.profile.plan, state.userPlans);
      const [editorGoal, setEditorGoal] = useState(null); // null | { name, current, target, targetDate }
      const [editorName, setEditorName] = useState('');
      const [editorCurrent, setEditorCurrent] = useState('');
      const [editorTarget, setEditorTarget] = useState('');
      const [editorDate, setEditorDate] = useState('');

      const openGoalEditor = (name = '', current = '', target = '', targetDate = '') => {
        setEditorName(name);
        setEditorCurrent(current);
        setEditorTarget(target);
        if (!targetDate) {
          const year = new Date().getFullYear();
          targetDate = `${year}-12-31`;
        }
        setEditorDate(targetDate);
        setEditorGoal({ name, current, target, targetDate });
      };

      const saveGoal = () => {
        const trimmedName = editorName.trim();
        if (!trimmedName || !editorCurrent || !editorTarget || !editorDate) return;
        const nextGoals = { ...(state.goals || {}) };
        nextGoals[trimmedName] = {
          current: parseInt(editorCurrent, 10),
          target: parseInt(editorTarget, 10),
          targetDate: editorDate,
          createdAt: state.goals?.[trimmedName]?.createdAt || new Date().toISOString().slice(0, 10),
        };
        persist({ ...state, goals: nextGoals });
        setEditorGoal(null);
      };

      const deleteGoal = (name) => {
        const nextGoals = { ...(state.goals || {}) };
        delete nextGoals[name];
        persist({ ...state, goals: nextGoals });
        setEditorGoal(null);
      };

      // Empty state
      if (workouts.length === 0) {
        return (
          <div className="min-h-screen pb-28 relative grain">
            <div className="px-5 pt-6 pb-2 flex items-center gap-3">
              <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-gray-900">
                <Icon.ChevronLeft size={28} />
              </button>
              <div>
                <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Statistik</div>
                <div className="font-display text-4xl text-gray-900">DEIN FORTSCHRITT</div>
              </div>
            </div>
            <div className="mt-20 px-8 text-center">
              <Icon.BarChart3 size={56} className="text-gray-300 mx-auto" strokeWidth={1.5} />
              <div className="font-display text-2xl text-gray-700 mt-4">NOCH KEINE DATEN</div>
              <div className="text-sm text-gray-500 mt-2">Absolviere dein erstes Workout, um deinen Fortschritt zu sehen.</div>
            </div>
            <BottomNav active="stats" setView={setView} hasHistory={false} />
          </div>
        );
      }

      // --- Aggregates ---
      const weeks12 = useMemo(() => getWeeklyFrequency(workouts, 12), [workouts]);
      const weeksHittingTarget = weeks12.filter((w) => w.count >= planDef.daysPerWeek).length;
      const activeWeeks = new Set(workouts.map((w) => getWeekStart(new Date(w.date)))).size;
      const totalDuration = workouts.reduce((s, w) => s + (w.durationMin || 0), 0);
      const avgPerWeek = activeWeeks > 0 ? (workouts.length / activeWeeks).toFixed(1) : '0';
      const avgDuration = Math.round(totalDuration / workouts.length);

      // --- Exercise stats ---
      const exStats = useMemo(() => getExerciseStats(workouts), [workouts]);
      const exNames = Object.keys(exStats).sort((a, b) => exStats[b].count - exStats[a].count);
      const [selectedEx, setSelectedEx] = useState(exNames[0] || null);
      const selectedHistory = selectedEx ? exStats[selectedEx].history : [];

      // Bodyweight exercises: tracked by reps, not 1RM
      const selectedIsBodyweight = selectedHistory.length > 0 && selectedHistory.every((h) => h.weight === 0);
      const selectedIsCardio = selectedEx ? isCardioExercise(selectedEx) : false;

      // --- Strength/Reps chart points ---
      const strengthPoints = selectedHistory.map((h, i) => ({
        x: i,
        y: selectedIsCardio ? h.weight : selectedIsBodyweight ? h.reps : h.top1RM,
        ...h,
      }));
      const firstRM = strengthPoints[0]?.y || 0;
      const lastRM = strengthPoints[strengthPoints.length - 1]?.y || 0;
      const pb = Math.max(...strengthPoints.map((p) => p.y), 0);
      const deltaPct = firstRM > 0 ? Math.round(((lastRM - firstRM) / firstRM) * 100) : 0;

      // --- Recent volume per workout (last 12) ---
      const recentVolume = workouts.slice(-12).map((w) => ({
        count: w.totalVolume / 1000, // tonnes for nicer scale
        date: w.date,
        code: w.templateCode,
      }));

      return (
        <div className="min-h-screen pb-28 relative grain">
          <div className="px-5 pt-6 pb-2 flex items-center gap-3">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-gray-900">
              <Icon.ChevronLeft size={28} />
            </button>
            <div>
              <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Statistik</div>
              <div className="font-display text-4xl text-gray-900">DEIN FORTSCHRITT</div>
            </div>
            <button onClick={() => setView('insights')} className="text-gray-500 hover:text-emerald-700 transition p-2 -mr-2">
              <Icon.Activity size={22} />
            </button>
          </div>

          {/* Overview grid — VISUAL REDESIGN */}
          <div className="px-5 mt-3 grid grid-cols-2 gap-2">
            <div className="rounded-2xl bg-emerald-50 border border-emerald-200 p-4 flex flex-col">
              <div className="flex items-center gap-1.5 mb-1">
                <Icon.Dumbbell size={12} className="text-emerald-600" />
                <div className="text-[10px] uppercase tracking-wider text-emerald-700 font-semibold">Workouts</div>
              </div>
              <div className="font-display text-4xl text-emerald-800 mt-0.5">{workouts.length}</div>
              <div className="text-[10px] text-emerald-600/70 mt-1">in {activeWeeks} {activeWeeks === 1 ? 'Woche' : 'Wochen'}</div>
            </div>
            <div className="rounded-2xl bg-blue-50 border border-blue-200 p-4 flex flex-col">
              <div className="flex items-center gap-1.5 mb-1">
                <Icon.Calendar size={12} className="text-blue-600" />
                <div className="text-[10px] uppercase tracking-wider text-blue-700 font-semibold">Ø pro Woche</div>
              </div>
              <div className="font-display text-4xl text-blue-800 mt-0.5">{avgPerWeek}</div>
              <div className="text-[10px] text-blue-600/70 mt-1">Ziel: {planDef.daysPerWeek}</div>
            </div>
            <div className="rounded-2xl bg-violet-50 border border-violet-200 p-4 flex flex-col">
              <div className="flex items-center gap-1.5 mb-1">
                <Icon.Dumbbell size={12} className="text-violet-600" />
                <div className="text-[10px] uppercase tracking-wider text-violet-700 font-semibold">Volumen ges.</div>
              </div>
              <div className="font-display text-4xl text-violet-800 mt-0.5">{Math.round(state.stats.totalVolume / 1000)}<span className="text-xl ml-0.5">t</span></div>
              <div className="text-[10px] text-violet-600/70 mt-1">bewegt</div>
            </div>
            <div className="rounded-2xl bg-amber-50 border border-amber-200 p-4 flex flex-col">
              <div className="flex items-center gap-1.5 mb-1">
                <Icon.Clock size={12} className="text-amber-600" />
                <div className="text-[10px] uppercase tracking-wider text-amber-700 font-semibold">Ø Dauer</div>
              </div>
              <div className="font-display text-4xl text-amber-800 mt-0.5">{avgDuration}<span className="text-xl ml-0.5">min</span></div>
              <div className="text-[10px] text-amber-600/70 mt-1">pro Session</div>
            </div>
          </div>

          {/* Frequency */}
          <div className="px-5 mt-6">
            <div className="flex items-baseline justify-between mb-3 px-1">
              <div className="text-xs uppercase tracking-[0.25em] text-gray-500 font-semibold">Frequenz · 12 Wochen</div>
              <div className={"text-[11px] font-mono-num font-semibold " + (weeksHittingTarget >= 8 ? 'text-emerald-600' : weeksHittingTarget >= 4 ? 'text-amber-600' : 'text-red-500')}>{weeksHittingTarget}/12 Ziel erreicht</div>
            </div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-5">
              <BarChart data={weeks12} target={planDef.daysPerWeek} />
              <div className="flex justify-between text-[9px] text-gray-400 mt-1.5 px-0.5">
                <span>−12W</span>
                <span>−6W</span>
                <span>heute</span>
              </div>
              <div className="text-[10px] text-gray-500 mt-3 flex items-center gap-4">
                <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-emerald-500"></span>Ziel erreicht</span>
                <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm bg-emerald-200"></span>darunter</span>
                <span className="flex items-center gap-1.5"><span className="w-4 h-px bg-emerald-300"></span>Ziel ({planDef.daysPerWeek})</span>
              </div>
            </div>
          </div>

          {/* Strength progression */}
          <div className="px-5 mt-6">
            <div className="flex items-baseline justify-between mb-3 px-1">
              <div className="text-xs uppercase tracking-[0.25em] text-gray-500 font-semibold">Fortschritt</div>
              <div className="text-[10px] text-gray-400">{selectedIsCardio ? 'Stufen-Entwicklung' : selectedIsBodyweight ? 'Wdh.-Entwicklung' : 'geschätzter 1RM'}</div>
            </div>

            {/* Exercise pills — REDESIGNED */}
            <div className="flex gap-1.5 overflow-x-auto pb-2 -mx-1 px-1">
              {exNames.map((name) => (
                <button key={name} onClick={() => setSelectedEx(name)}
                  className={"flex-shrink-0 px-3.5 py-2 rounded-full text-xs font-semibold border whitespace-nowrap transition active:scale-95 " + (
                    selectedEx === name
                      ? 'bg-emerald-600 border-emerald-600 text-white shadow-sm'
                      : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'
                  )}>
                  {name} <span className={"opacity-70 font-mono-num " + (selectedEx === name ? 'text-emerald-100' : 'text-gray-400')}>·{exStats[name].count}</span>
                </button>
              ))}
            </div>

            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-5 mt-2">
              {selectedEx && strengthPoints.length > 0 ? (
                <>
                  <div className="flex items-baseline justify-between mb-3">
                    <div>
                      <div className="font-display text-2xl text-gray-900">{selectedEx.toUpperCase()}</div>
                      <div className="text-[10px] text-gray-500 mt-1 font-mono-num">
                        {strengthPoints.length} {strengthPoints.length === 1 ? 'Session' : 'Sessions'} ·
                        {selectedIsCardio
                          ? ` Beste Einheit: Stufe ${strengthPoints[strengthPoints.length - 1].weight} · ${strengthPoints[strengthPoints.length - 1].reps}min`
                          : selectedIsBodyweight
                            ? ` Bestes Set: ${strengthPoints[strengthPoints.length - 1].reps} Wdh.`
                            : ` Bestes Set: ${strengthPoints[strengthPoints.length - 1].weight}kg × ${strengthPoints[strengthPoints.length - 1].reps}`}
                      </div>
                    </div>
                    {strengthPoints.length > 1 && (
                      <div className={"text-right px-3 py-1 rounded-full text-sm font-bold " + (deltaPct >= 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700')}>
                        {deltaPct >= 0 ? '+' : ''}{deltaPct}%
                        <div className="text-[9px] font-normal opacity-70">vs. erstes Mal</div>
                      </div>
                    )}
                  </div>
                  <LineChart points={strengthPoints} />
                  <div className="grid grid-cols-3 gap-3 mt-4">
                    <div className="rounded-xl bg-white border border-gray-200 py-3 text-center">
                      <div className="text-[9px] uppercase tracking-wider text-gray-400 mb-1">Start</div>
                      <div className="font-mono-num font-bold text-gray-600 text-lg">{firstRM}{selectedIsCardio ? ' Stufe' : selectedIsBodyweight ? ' Wdh.' : ' kg'}</div>
                    </div>
                    <div className="rounded-xl bg-white border border-emerald-200 py-3 text-center">
                      <div className="text-[9px] uppercase tracking-wider text-emerald-600 mb-1">Aktuell</div>
                      <div className="font-mono-num font-bold text-emerald-700 text-lg">{lastRM}{selectedIsCardio ? ' Stufe' : selectedIsBodyweight ? ' Wdh.' : ' kg'}</div>
                    </div>
                    <div className="rounded-xl bg-white border border-emerald-200 py-3 text-center">
                      <div className="text-[9px] uppercase tracking-wider text-emerald-600 mb-1">Rekord</div>
                      <div className="font-mono-num font-bold text-emerald-700 text-lg">{pb}{selectedIsCardio ? ' Stufe' : selectedIsBodyweight ? ' Wdh.' : ' kg'}</div>
                    </div>
                  </div>
                </>
              ) : (
                <div className="text-gray-500 text-sm py-6 text-center">Wähle eine Übung aus</div>
              )}
            </div>
          </div>

          {/* Goals */}
          <div className="px-5 mt-6">
            <div className="flex items-baseline justify-between mb-3 px-1">
              <div className="text-xs uppercase tracking-[0.25em] text-gray-500 font-semibold">Ziele</div>
              <button onClick={() => openGoalEditor()} className="text-emerald-700 text-xs hover:text-emerald-800 font-semibold">
                + Neues Ziel
              </button>
            </div>
            {Object.keys(state.goals || {}).length === 0 ? (
              <div className="rounded-2xl bg-gray-50 border border-gray-200 p-6 text-center">
                <Icon.Trophy size={32} className="text-gray-300 mx-auto mb-2" strokeWidth={1.5} />
                <div className="text-sm text-gray-500">Noch keine Ziele. Tippe „+ Neues Ziel" um eine Wette oder Challenge zu verfolgen.</div>
              </div>
            ) : (
              <div className="space-y-3">
                {Object.entries(state.goals || {}).map(([name, goal]) => {
                  const progress = Math.min(100, (goal.current / goal.target) * 100);
                  const daysLeft = Math.max(0, Math.floor((new Date(goal.targetDate).getTime() - Date.now()) / (1000 * 60 * 60 * 24)));
                  const prediction = predictRepsAtDate(name, workouts, goal.targetDate);
                  const onTrack = prediction ? prediction >= goal.target : null;
                  return (
                    <button key={name} onClick={() => openGoalEditor(name, goal.current, goal.target, goal.targetDate)} className="w-full text-left rounded-2xl bg-white border border-gray-200 p-4 active:bg-gray-50 transition">
                      <div className="flex items-baseline justify-between mb-2">
                        <div className="font-semibold text-gray-900">{name}</div>
                        <div className="font-mono-num text-sm font-bold text-emerald-700">{goal.current} / {goal.target}</div>
                      </div>
                      <div className="h-2.5 rounded-full bg-gray-100 overflow-hidden mb-2">
                        <div className="h-full bg-emerald-500 transition-all duration-500 rounded-full" style={{ width: `${progress}%` }} />
                      </div>
                      <div className="flex justify-between text-[10px] text-gray-500">
                        <span>
                          {daysLeft} {daysLeft === 1 ? 'Tag' : 'Tage'} verbleibend
                        </span>
                        {prediction !== null && (
                          <span className={onTrack ? 'text-emerald-600 font-bold' : 'text-amber-600 font-bold'}>
                            {onTrack ? '✓ Prognose: ' : '⚠ Prognose: '}{prediction} Reps
                          </span>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Körpergewicht */}
          {(state.bodyWeight || []).length >= 2 && (() => {
            const bwSorted = [...(state.bodyWeight || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
            const pts = bwSorted.map((e, i) => ({ x: i, y: e.kg, date: e.date }));
            const first = pts[0].y, last = pts[pts.length - 1].y;
            const delta = (last - first).toFixed(1);
            return (
              <div className="px-5 mt-5">
                <div className="flex items-baseline justify-between mb-2 px-1">
                  <div className="text-xs uppercase tracking-[0.25em] text-gray-500">Körpergewicht</div>
                  <div className={`text-xs font-mono-num font-bold ${parseFloat(delta) < 0 ? 'text-emerald-600' : parseFloat(delta) > 0 ? 'text-red-400' : 'text-gray-400'}`}>
                    {parseFloat(delta) > 0 ? '+' : ''}{delta} kg gesamt
                  </div>
                </div>
                <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
                  <div className="flex justify-between mb-3">
                    {[{l:'Start',v:first},{l:'Aktuell',v:last},{l:'Ø',v:(bwSorted.reduce((s,e)=>s+e.kg,0)/bwSorted.length).toFixed(1)}].map(({l,v})=>(
                      <div key={l} className="text-center">
                        <div className="text-[9px] uppercase tracking-wider text-gray-500">{l}</div>
                        <div className="font-mono-num font-bold text-gray-900 text-sm mt-0.5">{v} kg</div>
                      </div>
                    ))}
                  </div>
                  <LineChart points={pts} />
                  <div className="flex justify-between text-[9px] text-gray-400 mt-1">
                    <span>{new Date(bwSorted[0].date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})}</span>
                    <span>{new Date(bwSorted[bwSorted.length-1].date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})}</span>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Volume per session */}
          <div className="px-5 mt-5">
            <div className="flex items-baseline justify-between mb-2 px-1">
            <div className="text-xs uppercase tracking-[0.25em] text-gray-500">Volumen · letzte {recentVolume.length} Sessions</div>
              <div className="text-[10px] text-gray-500">in Tonnen</div>
            </div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
              <BarChart data={recentVolume} getColor={() => '#bef264'} />
              <div className="flex justify-between text-[9px] text-gray-400 mt-1 px-0.5">
                <span>älteste</span>
                <span>neueste</span>
              </div>
            </div>
          </div>

          {/* Top exercises */}
          <div className="px-5 mt-5">
            <div className="text-xs uppercase tracking-[0.25em] text-gray-500 mb-2 px-1">Top-Übungen</div>
            <div className="rounded-2xl bg-gray-50 border border-gray-200 divide-y divide-gray-200 overflow-hidden">
              {exNames.slice(0, 8).map((name, i) => {
                const s = exStats[name];
                const maxCount = exStats[exNames[0]].count;
                const widthPct = (s.count / maxCount) * 100;
                return (
                  <button key={name} onClick={() => setSelectedEx(name)} className="w-full p-3 text-left relative overflow-hidden active:bg-gray-100/70">
                    <div className="absolute inset-y-0 left-0 bg-emerald-100/5" style={{ width: `${widthPct}%` }}></div>
                    <div className="relative flex items-center gap-3">
                      <div className="font-display text-xl text-gray-400 w-6">{i + 1}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-gray-900 truncate text-sm">{name}</div>
                        <div className="text-[10px] text-gray-500 mt-0.5 font-mono-num">{s.totalSets} Sätze · {Math.round(s.totalVolume).toLocaleString('de-DE')} kg</div>
                      </div>
                      <div className="font-mono-num text-sm text-emerald-700">{s.count}×</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="text-center text-gray-400 text-[10px] mt-6 px-5">
            Gewichtsübungen: geschätzter 1RM nach Epley · Bodyweight: direkte Wdh.-Entwicklung
          </div>

          {/* Goal Editor Modal */}
          {editorGoal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end z-50">
              <div className="bg-white w-full rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto" style={{ paddingTop: 'max(24px, env(safe-area-inset-top))' }}>
                <div className="flex items-center justify-between mb-4">
                  <div className="font-display text-2xl text-gray-900">Ziel</div>
                  <button onClick={() => setEditorGoal(null)} className="text-gray-500 hover:text-gray-900"><Icon.X size={22} /></button>
                </div>
                <div className="space-y-3 mb-5">
                  <div>
                    <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Übung</label>
                    <input type="text" value={editorName} onChange={(e) => setEditorName(e.target.value)}
                      placeholder="z.B. Klimmzüge"
                      className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Jetzt</label>
                      <input type="number" value={editorCurrent} onChange={(e) => setEditorCurrent(e.target.value)}
                        className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none font-mono-num" />
                    </div>
                    <div>
                      <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Ziel</label>
                      <input type="number" value={editorTarget} onChange={(e) => setEditorTarget(e.target.value)}
                        className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none font-mono-num" />
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Zieldatum</label>
                    <input type="date" value={editorDate} onChange={(e) => setEditorDate(e.target.value)}
                      className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none font-mono-num" />
                  </div>
                </div>
                <div className="flex gap-2">
                  {editorGoal.name && (
                    <button onClick={() => deleteGoal(editorGoal.name)} className="px-3 py-2.5 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm font-medium">
                      Löschen
                    </button>
                  )}
                  <button onClick={() => setEditorGoal(null)} className="flex-1 px-3 py-2.5 rounded-xl bg-gray-100 border border-gray-200 text-gray-900 text-sm font-medium">
                    Abbrechen
                  </button>
                  <button onClick={saveGoal} className="flex-1 px-3 py-2.5 rounded-xl bg-emerald-500 text-white text-sm font-bold">
                    Speichern
                  </button>
                </div>
              </div>
            </div>
          )}

          <BottomNav active="stats" setView={setView} hasHistory={state.workouts.length > 0} />
        </div>
      );
    };

    // ========================================================================
    // INSIGHTS VIEW
    // ========================================================================
    const InsightCard = ({ type, icon, title, body }) => {
      const colors = {
        positive: 'bg-emerald-50 border-emerald-300 text-emerald-800',
        warning: 'bg-amber-50 border-amber-300 text-amber-800',
        negative: 'bg-red-50 border-red-300 text-red-800',
        info: 'bg-gray-50 border-gray-300 text-gray-800',
      };
      const iconColors = {
        positive: 'text-emerald-600',
        warning: 'text-amber-600',
        negative: 'text-red-600',
        info: 'text-gray-500',
      };
      const IconCmp = Icon[icon] || Icon.Activity;
      return (
        <div className={`rounded-2xl border p-4 ${colors[type] || colors.info}`}>
          <div className="flex items-start gap-3">
            <div className={`mt-0.5 flex-shrink-0 ${iconColors[type]}`}>
              <IconCmp size={18} strokeWidth={2.5} />
            </div>
            <div>
              <div className="font-semibold text-sm leading-tight">{title}</div>
              <div className="text-xs mt-1 opacity-80 leading-relaxed">{body}</div>
            </div>
          </div>
        </div>
      );
    };

    const InsightsView = ({ state, setView, postWorkout = null }) => {
      const insights = useMemo(() => {
        if (postWorkout) return generateInsights({ ...state, workouts: [...state.workouts, postWorkout] });
        return generateInsights(state);
      }, [state, postWorkout]);

      const positive = insights.filter((i) => i.type === INSIGHT_TYPES.POSITIVE);
      const warning = insights.filter((i) => i.type === INSIGHT_TYPES.WARNING || i.type === INSIGHT_TYPES.NEGATIVE);
      const info = insights.filter((i) => i.type === INSIGHT_TYPES.INFO);

      return (
        <div className={`relative grain ${postWorkout ? '' : 'min-h-screen pb-28'}`}>
          <div className={`px-5 pt-6 pb-2 flex items-center gap-3 ${postWorkout ? 'pt-4' : ''}`}>
            <button onClick={() => setView(postWorkout ? 'history' : 'stats')} className="text-gray-500 hover:text-gray-900">
              <Icon.ChevronLeft size={28} />
            </button>
            <div>
              <div className="text-xs uppercase tracking-[0.3em] text-gray-500">Analyse</div>
              <div className="font-display text-4xl text-gray-900">DEIN COACH</div>
            </div>
          </div>

          {insights.length === 0 && (
            <div className="mt-20 px-8 text-center">
              <Icon.Activity size={56} className="text-gray-300 mx-auto" strokeWidth={1.5} />
              <div className="font-display text-2xl text-gray-700 mt-4">NOCH KEINE DATEN</div>
              <div className="text-sm text-gray-500 mt-2">Mindestens 3–4 Workouts nötig für aussagekräftige Erkenntnisse.</div>
            </div>
          )}

          {positive.length > 0 && (
            <div className="px-5 mt-4">
              <div className="text-xs uppercase tracking-[0.25em] text-emerald-600 mb-2 px-1">Stärken</div>
              <div className="space-y-2">
                {positive.map((ins, i) => <InsightCard key={i} {...ins} />)}
              </div>
            </div>
          )}

          {warning.length > 0 && (
            <div className="px-5 mt-5">
              <div className="text-xs uppercase tracking-[0.25em] text-amber-600 mb-2 px-1">Aufmerksamkeit</div>
              <div className="space-y-2">
                {warning.map((ins, i) => <InsightCard key={i} {...ins} />)}
              </div>
            </div>
          )}

          {info.length > 0 && (
            <div className="px-5 mt-5">
              <div className="text-xs uppercase tracking-[0.25em] text-gray-500 mb-2 px-1">Empfehlungen</div>
              <div className="space-y-2">
                {info.map((ins, i) => <InsightCard key={i} {...ins} />)}
              </div>
            </div>
          )}

          {!postWorkout && (
            <BottomNav active="stats" setView={setView} hasHistory={state.workouts.length > 0} />
          )}
        </div>
      );
    };

    // ========================================================================
    // TEMPLATE EDITOR (fullscreen modal launched from settings)
    // ========================================================================
    const NumField = ({ label, value, onChange, min = 1, max = 99 }) => (
      <div className="bg-white border border-gray-200 rounded-xl p-2">
        <div className="text-[9px] uppercase tracking-wider text-gray-500 text-center mb-1">{label}</div>
        <div className="flex items-center justify-between gap-1">
          <button onClick={() => onChange(Math.max(min, value - 1))} className="w-8 h-8 rounded-lg bg-gray-100 active:bg-zinc-700 text-gray-800 flex items-center justify-center">
            <Icon.Minus size={14} strokeWidth={3} />
          </button>
          <span className="font-mono-num text-xl font-bold text-gray-900 tabular-nums">{value}</span>
          <button onClick={() => onChange(Math.min(max, value + 1))} className="w-8 h-8 rounded-lg bg-gray-100 active:bg-zinc-700 text-gray-800 flex items-center justify-center">
            <Icon.Plus size={14} strokeWidth={3} />
          </button>
        </div>
      </div>
    );

    const TemplateEditor = ({ templateKey, current, isCustom, onSave, onReset, onClose }) => {
      const [exercises, setExercises] = useState(() => current.exercises.map((e) => ({ ...e })));
      const [editingIndex, setEditingIndex] = useState(null);
      const [confirmReset, setConfirmReset] = useState(false);

      const updateEx = (i, patch) => {
        const next = [...exercises];
        next[i] = { ...next[i], ...patch };
        setExercises(next);
      };
      const moveEx = (i, dir) => {
        const j = i + dir;
        if (j < 0 || j >= exercises.length) return;
        const next = [...exercises];
        [next[i], next[j]] = [next[j], next[i]];
        setExercises(next);
        if (editingIndex === i) setEditingIndex(j);
        else if (editingIndex === j) setEditingIndex(i);
      };
      const deleteEx = (i) => {
        const next = exercises.filter((_, idx) => idx !== i);
        setExercises(next);
        if (editingIndex === i) setEditingIndex(null);
        else if (editingIndex !== null && editingIndex > i) setEditingIndex(editingIndex - 1);
      };
      const addEx = () => {
        const next = [...exercises, { name: 'Neue Übung', sets: 3, repRange: [8, 12], focus: '', restSeconds: 90, cardio: false, meters: 0 }];
        setExercises(next);
        setEditingIndex(next.length - 1);
      };

      const totalSets = exercises.reduce((s, e) => s + (e.sets || 0), 0);
      const canSave = exercises.length > 0 && exercises.every((e) => e.name.trim() && e.sets > 0 && e.repRange[0] > 0 && e.repRange[1] >= e.repRange[0]);

      return (
        <div className="fixed inset-0 bg-white z-50 overflow-y-auto" style={{ paddingTop: 'env(safe-area-inset-top)', paddingBottom: 'env(safe-area-inset-bottom)' }}>
          {/* Header */}
          <div className="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <button onClick={onClose} className="text-gray-600 hover:text-gray-900 p-1">
              <Icon.X size={22} />
            </button>
            <div className="text-center">
              <div className="text-[10px] uppercase tracking-[0.3em] text-gray-500">Plan bearbeiten</div>
              <div className="font-display text-xl text-gray-900 leading-none mt-0.5">{current.name.toUpperCase()}</div>
            </div>
            <button onClick={() => canSave && onSave(exercises)} disabled={!canSave}
              className={`px-3 py-1.5 rounded-lg text-sm font-bold ${canSave ? 'bg-emerald-100 text-emerald-900' : 'bg-gray-100 text-gray-400'}`}>
              Speichern
            </button>
          </div>

          {/* Stats strip */}
          <div className="px-4 py-3 flex gap-2 text-center text-xs">
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2">
              <div className="text-gray-500 uppercase tracking-wider text-[10px]">Übungen</div>
              <div className="font-display text-xl text-gray-900 mt-0.5">{exercises.length}</div>
            </div>
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2">
              <div className="text-gray-500 uppercase tracking-wider text-[10px]">Sätze ges.</div>
              <div className="font-display text-xl text-gray-900 mt-0.5">{totalSets}</div>
            </div>
            <div className="flex-1 rounded-xl bg-gray-50 border border-gray-200 p-2">
              <div className="text-gray-500 uppercase tracking-wider text-[10px]">Status</div>
              <div className="font-display text-xl text-emerald-700 mt-0.5">{isCustom ? 'Custom' : 'Standard'}</div>
            </div>
          </div>

          {/* Exercise list */}
          <div className="px-4 space-y-2 pb-4">
            {exercises.map((ex, i) => {
              const isOpen = editingIndex === i;
              return (
                <div key={i} className={`rounded-2xl border overflow-hidden ${isOpen ? 'bg-gray-50 border-emerald-300' : 'bg-gray-50 border-gray-200'}`}>
                  <div className="p-3 flex items-center gap-2">
                    <div className="flex flex-col gap-0.5">
                      <button onClick={() => moveEx(i, -1)} disabled={i === 0}
                        className={`w-7 h-6 rounded flex items-center justify-center ${i === 0 ? 'text-gray-300' : 'text-gray-600 bg-gray-100 active:bg-zinc-700'}`}>
                        <Icon.ChevronUp size={14} strokeWidth={3} />
                      </button>
                      <button onClick={() => moveEx(i, 1)} disabled={i === exercises.length - 1}
                        className={`w-7 h-6 rounded flex items-center justify-center ${i === exercises.length - 1 ? 'text-gray-300' : 'text-gray-600 bg-gray-100 active:bg-zinc-700'}`}>
                        <Icon.ChevronDown size={14} strokeWidth={3} />
                      </button>
                    </div>
                    <button onClick={() => setEditingIndex(isOpen ? null : i)} className="flex-1 text-left min-w-0">
                      <div className="font-semibold text-gray-900 truncate">{ex.name || <span className="text-gray-500 italic">unbenannt</span>}</div>
                      <div className="text-[11px] text-gray-500 mt-0.5 font-mono-num">
                        {ex.cardio
                          ? `${ex.repRange[0]}–${ex.repRange[1]} min${ex.meters ? ' · ' + ex.meters + 'm' : ''}${ex.focus ? ' · ' + ex.focus : ''}`
                          : `${ex.sets}×${ex.repRange[0]}–${ex.repRange[1]}${ex.focus ? ' · ' + ex.focus : ''}`}
                      </div>
                    </button>
                    <button onClick={() => deleteEx(i)} className="w-9 h-9 rounded-lg bg-red-500/10 text-red-400 active:bg-red-500/20 flex items-center justify-center">
                      <Icon.Trash2 size={15} />
                    </button>
                  </div>

                  {isOpen && (
                    <div className="border-t border-gray-200 px-3 pt-3 pb-4 space-y-3 slide-up">
                      <div>
                        <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Name</div>
                        <input type="text" value={ex.name} onChange={(e) => updateEx(i, { name: e.target.value })}
                          className="w-full bg-white border border-gray-300 focus:border-emerald-400 rounded-xl px-3 py-2.5 text-gray-900 outline-none" />
                      </div>
                      <div>
                        <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Fokus (optional)</div>
                        <input type="text" value={ex.focus || ''} onChange={(e) => updateEx(i, { focus: e.target.value })}
                          placeholder="z.B. Brust / Trizeps"
                          className="w-full bg-white border border-gray-300 focus:border-emerald-400 rounded-xl px-3 py-2.5 text-gray-900 outline-none text-sm" />
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => updateEx(i, { cardio: !ex.cardio })}
                          className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition ${ex.cardio ? 'bg-blue-50 border-blue-300 text-blue-700' : 'bg-gray-100 border-gray-200 text-gray-500'}`}>
                          {ex.cardio ? '🔥 Cardio' : '💪 Kraft'}
                        </button>
                      </div>
                      {ex.cardio ? (
                        <div className="grid grid-cols-4 gap-2">
                          <NumField label="Einheiten" value={ex.sets} onChange={(v) => updateEx(i, { sets: Math.max(1, v) })} min={1} max={10} />
                          <NumField label="Minuten" value={ex.repRange[0]} onChange={(v) => updateEx(i, { repRange: [Math.max(1, v), Math.max(ex.repRange[1], v)] })} min={1} max={120} />
                          <NumField label="Stufe" value={ex.weight || 5} onChange={(v) => updateEx(i, { weight: Math.max(1, Math.min(10, v)) })} min={1} max={10} />
                          <NumField label="Meter" value={ex.meters || 1000} onChange={(v) => updateEx(i, { meters: Math.max(100, v) })} min={100} max={50000} />
                        </div>
                      ) : (
                        <div className="grid grid-cols-4 gap-2">
                          <NumField label="Sätze" value={ex.sets} onChange={(v) => updateEx(i, { sets: Math.max(1, v) })} min={1} max={10} />
                          <NumField label="Wdh.-Min" value={ex.repRange[0]} onChange={(v) => updateEx(i, { repRange: [Math.max(1, v), Math.max(ex.repRange[1], v)] })} min={1} max={50} />
                          <NumField label="Wdh.-Max" value={ex.repRange[1]} onChange={(v) => updateEx(i, { repRange: [ex.repRange[0], Math.max(ex.repRange[0], v)] })} min={1} max={50} />
                          <NumField label="Pause" value={ex.restSeconds || 90} onChange={(v) => updateEx(i, { restSeconds: Math.max(30, Math.min(300, v)) })} min={30} max={300} />
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            <button onClick={addEx} className="w-full p-4 rounded-2xl border-2 border-dashed border-gray-300 text-gray-600 active:border-emerald-400 active:text-emerald-700 flex items-center justify-center gap-2 text-sm font-medium">
              <Icon.Plus size={16} strokeWidth={3} /> Übung hinzufügen
            </button>

            {isCustom && (
              <button onClick={() => setConfirmReset(true)} className="w-full p-3 mt-4 rounded-xl border border-amber-500/30 bg-amber-500/10 text-amber-300 text-xs font-medium flex items-center justify-center gap-2">
                <Icon.RotateCcw size={14} /> Auf Standard-Plan zurücksetzen
              </button>
            )}

            <div className="text-[11px] text-gray-400 text-center pt-2">
              Tipp: Tippe auf eine Übung, um sie zu bearbeiten.
            </div>
          </div>

          {confirmReset && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-gray-50 border border-gray-200 rounded-3xl p-6 max-w-sm w-full">
                <Icon.AlertTriangle size={32} className="text-amber-400 mx-auto" />
                <div className="font-display text-2xl text-center mt-3">PLAN ZURÜCKSETZEN?</div>
                <div className="text-sm text-gray-600 text-center mt-2">Deine Anpassungen an {current.name} gehen verloren.</div>
                <div className="mt-5 flex gap-2">
                  <button onClick={() => setConfirmReset(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-800 font-medium">Abbrechen</button>
                  <button onClick={onReset} className="flex-1 py-3 rounded-xl bg-amber-500 text-emerald-900 font-bold">Zurücksetzen</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========================================================================
    // PLAN CREATOR
    // ========================================================================
    const PlanCreator = ({ planKey, existing, onSave, onDelete, onClose }) => {
      const isNew = planKey === '__new__';
      const [planName, setPlanName] = useState(existing?.label || '');
      const [daysPerWeek, setDaysPerWeek] = useState(existing?.daysPerWeek || 3);
      const [days, setDays] = useState(() =>
        existing?.days
          ? existing.days.map((d) => ({ ...d, exercises: d.exercises.map((e) => ({ ...e })) }))
          : Array.from({ length: 3 }, (_, i) => ({
              name: `Tag ${i + 1}`, code: String.fromCharCode(65 + i), exercises: [],
            }))
      );
      const [activeDayIdx, setActiveDayIdx] = useState(0);
      const [showLibrary, setShowLibrary] = useState(false);
      const [libraryFilter, setLibraryFilter] = useState('Alle');
      const [confirmDelete, setConfirmDelete] = useState(false);

      // Sync day count with daysPerWeek
      const updateDaysPerWeek = (n) => {
        setDaysPerWeek(n);
        setDays((prev) => {
          if (n > prev.length) {
            return [...prev, ...Array.from({ length: n - prev.length }, (_, i) => ({
              name: `Tag ${prev.length + i + 1}`, code: String.fromCharCode(65 + prev.length + i), exercises: [],
            }))];
          }
          return prev.slice(0, n);
        });
        if (activeDayIdx >= n) setActiveDayIdx(n - 1);
      };

      const updateDay = (patch) => {
        setDays((prev) => prev.map((d, i) => i === activeDayIdx ? { ...d, ...patch } : d));
      };

      const addExFromLibrary = (libEx) => {
        const ex = { name: libEx.name, sets: libEx.sets, repRange: libEx.repRange, focus: libEx.focus, bodyweight: libEx.bodyweight || false, cardio: libEx.cardio || false };
        updateDay({ exercises: [...days[activeDayIdx].exercises, ex] });
      };

      const addCustomEx = () => {
        updateDay({ exercises: [...days[activeDayIdx].exercises, { name: 'Neue Übung', sets: 3, repRange: [8, 12], focus: '', restSeconds: 90, cardio: false }] });
      };

      const updateEx = (exIdx, patch) => {
        const newEx = [...days[activeDayIdx].exercises];
        newEx[exIdx] = { ...newEx[exIdx], ...patch };
        updateDay({ exercises: newEx });
      };

      const moveEx = (exIdx, dir) => {
        const newEx = [...days[activeDayIdx].exercises];
        const j = exIdx + dir;
        if (j < 0 || j >= newEx.length) return;
        [newEx[exIdx], newEx[j]] = [newEx[j], newEx[exIdx]];
        updateDay({ exercises: newEx });
      };

      const removeEx = (exIdx) => {
        updateDay({ exercises: days[activeDayIdx].exercises.filter((_, i) => i !== exIdx) });
      };

      const [expandedEx, setExpandedEx] = useState(null);

      const canSave = planName.trim() && days.every((d) => d.exercises.length > 0);

      const handleSave = () => {
        const key = isNew ? 'plan_' + Date.now() : planKey;
        onSave(key, {
          label: planName.trim(),
          desc: `${daysPerWeek}× pro Woche · eigener Plan`,
          daysPerWeek,
          days,
        });
      };

      const filteredLib = libraryFilter === 'Alle' ? EXERCISE_LIBRARY : EXERCISE_LIBRARY.filter((e) => e.category === libraryFilter);

      return (
        <div className="fixed inset-0 bg-white z-50 overflow-hidden flex flex-col" style={{ paddingTop: 'env(safe-area-inset-top)', paddingBottom: 'env(safe-area-inset-bottom)' }}>
          {/* Header */}
          <div className="border-b border-gray-200 px-4 py-3 flex items-center justify-between flex-shrink-0">
            <button onClick={onClose} className="text-gray-400 hover:text-gray-900 p-1"><Icon.X size={22} /></button>
            <div className="text-center">
              <div className="text-[10px] uppercase tracking-[0.3em] text-gray-500">{isNew ? 'Neuer Plan' : 'Plan bearbeiten'}</div>
              <div className="font-display text-xl text-gray-900 leading-none mt-0.5">{planName || '...'}</div>
            </div>
            <button onClick={handleSave} disabled={!canSave}
              className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${canSave ? 'bg-emerald-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
              Speichern
            </button>
          </div>

          <div className="overflow-y-auto flex-1 pb-4">
            {/* Plan name */}
            <div className="px-4 pt-4">
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Planname</div>
              <input type="text" value={planName} onChange={(e) => setPlanName(e.target.value)}
                placeholder="z.B. Push / Pull / Legs"
                className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none font-medium" />
            </div>

            {/* Days per week */}
            <div className="px-4 mt-4">
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Trainingstage pro Woche</div>
              <div className="flex gap-2">
                {[2, 3, 4, 5].map((n) => (
                  <button key={n} onClick={() => updateDaysPerWeek(n)}
                    className={`flex-1 py-2.5 rounded-xl border font-bold text-sm ${daysPerWeek === n ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-700'}`}>
                    {n}×
                  </button>
                ))}
              </div>
            </div>

            {/* Day tabs */}
            <div className="px-4 mt-5">
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Trainingstage</div>
              <div className="flex gap-2 overflow-x-auto pb-1">
                {days.map((d, i) => (
                  <button key={i} onClick={() => { setActiveDayIdx(i); setExpandedEx(null); }}
                    className={`flex-shrink-0 px-4 py-2 rounded-xl border font-medium text-sm whitespace-nowrap ${i === activeDayIdx ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-600'}`}>
                    {d.name || `Tag ${i + 1}`}
                    <span className="ml-1.5 text-[10px] opacity-60">{d.exercises.length}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Active day config */}
            <div className="px-4 mt-3">
              <div className="flex gap-2 mb-3">
                <input type="text" value={days[activeDayIdx].name} onChange={(e) => updateDay({ name: e.target.value })}
                  placeholder="Tag benennen"
                  className="flex-1 bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2 text-gray-900 outline-none text-sm" />
                <input type="text" maxLength={2} value={days[activeDayIdx].code} onChange={(e) => updateDay({ code: e.target.value.toUpperCase().slice(0, 2) })}
                  placeholder="A"
                  className="w-14 bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2 text-gray-900 outline-none text-sm text-center font-bold" />
              </div>

              {/* Exercise list for this day */}
              <div className="space-y-2">
                {days[activeDayIdx].exercises.length === 0 && (
                  <div className="text-center text-gray-400 text-sm py-6 rounded-2xl bg-gray-50 border border-dashed border-gray-300">
                    Keine Übungen — füge welche aus der Bibliothek hinzu.
                  </div>
                )}
                {days[activeDayIdx].exercises.map((ex, exIdx) => {
                  const isOpen = expandedEx === exIdx;
                  return (
                    <div key={exIdx} className={`rounded-2xl border overflow-hidden ${isOpen ? 'border-emerald-300 bg-white' : 'border-gray-200 bg-gray-50'}`}>
                      <div className="p-3 flex items-center gap-2">
                        <div className="flex flex-col gap-0.5">
                          <button onClick={() => moveEx(exIdx, -1)} disabled={exIdx === 0}
                            className={`w-7 h-6 rounded flex items-center justify-center ${exIdx === 0 ? 'text-gray-300' : 'text-gray-500 bg-gray-200 active:bg-gray-300'}`}>
                            <Icon.ChevronUp size={13} strokeWidth={3} />
                          </button>
                          <button onClick={() => moveEx(exIdx, 1)} disabled={exIdx === days[activeDayIdx].exercises.length - 1}
                            className={`w-7 h-6 rounded flex items-center justify-center ${exIdx === days[activeDayIdx].exercises.length - 1 ? 'text-gray-300' : 'text-gray-500 bg-gray-200 active:bg-gray-300'}`}>
                            <Icon.ChevronDown size={13} strokeWidth={3} />
                          </button>
                        </div>
                        <button onClick={() => setExpandedEx(isOpen ? null : exIdx)} className="flex-1 text-left">
                          <div className="font-semibold text-gray-900 text-sm">{ex.name}</div>
                          <div className="text-[10px] text-gray-500 font-mono-num">{ex.sets}×{ex.repRange[0]}–{ex.repRange[1]} {ex.focus && `· ${ex.focus}`}</div>
                        </button>
                        <button onClick={() => removeEx(exIdx)} className="w-8 h-8 rounded-lg bg-red-50 text-red-400 active:bg-red-100 flex items-center justify-center">
                          <Icon.Trash2 size={14} />
                        </button>
                      </div>
                      {isOpen && (
                        <div className="border-t border-gray-100 px-3 pb-3 pt-2 space-y-2 slide-up">
                          <input type="text" value={ex.name} onChange={(e) => updateEx(exIdx, { name: e.target.value })}
                            className="w-full bg-white border border-gray-200 focus:border-emerald-400 rounded-xl px-3 py-2 text-gray-900 outline-none text-sm" />
                          <input type="text" value={ex.focus || ''} onChange={(e) => updateEx(exIdx, { focus: e.target.value })}
                            placeholder="Fokus (optional)"
                            className="w-full bg-white border border-gray-200 focus:border-emerald-400 rounded-xl px-3 py-2 text-gray-900 outline-none text-sm" />
                          <div className="grid grid-cols-4 gap-2">
                            <NumField label="Sätze"    value={ex.sets}         onChange={(v) => updateEx(exIdx, { sets: Math.max(1, v) })} min={1} max={10} />
                            <NumField label="Min-Wdh"  value={ex.repRange[0]}  onChange={(v) => updateEx(exIdx, { repRange: [Math.max(1, v), Math.max(ex.repRange[1], v)] })} min={1} max={50} />
                            <NumField label="Max-Wdh"  value={ex.repRange[1]}  onChange={(v) => updateEx(exIdx, { repRange: [ex.repRange[0], Math.max(ex.repRange[0], v)] })} min={1} max={50} />
                            <NumField label="Pause"    value={ex.restSeconds || 90} onChange={(v) => updateEx(exIdx, { restSeconds: Math.max(30, Math.min(300, v)) })} min={30} max={300} />
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Add buttons */}
              <div className="flex gap-2 mt-3">
                <button onClick={() => setShowLibrary(true)}
                  className="flex-1 p-3 rounded-2xl border-2 border-dashed border-gray-300 text-gray-500 hover:border-emerald-400 hover:text-emerald-700 flex items-center justify-center gap-1.5 text-sm font-medium transition">
                  <Icon.Dumbbell size={15} /> Aus Bibliothek
                </button>
                <button onClick={addCustomEx}
                  className="flex-1 p-3 rounded-2xl border-2 border-dashed border-gray-300 text-gray-500 hover:border-emerald-400 hover:text-emerald-700 flex items-center justify-center gap-1.5 text-sm font-medium transition">
                  <Icon.Plus size={15} strokeWidth={3} /> Eigene
                </button>
              </div>
            </div>

            {/* Delete plan (only for existing) */}
            {!isNew && (
              <div className="px-4 mt-6">
                <button onClick={() => setConfirmDelete(true)} className="w-full p-3 rounded-xl border border-red-200 bg-red-50 text-red-500 text-sm font-medium flex items-center justify-center gap-2">
                  <Icon.Trash2 size={15} /> Plan löschen
                </button>
              </div>
            )}
          </div>

          {/* Library sheet */}
          {showLibrary && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end">
              <div className="bg-white w-full rounded-t-3xl max-h-[85vh] flex flex-col" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                <div className="flex items-center justify-between px-4 pt-4 pb-2 border-b border-gray-100 flex-shrink-0">
                  <div className="font-display text-xl text-gray-900">Bibliothek</div>
                  <button onClick={() => setShowLibrary(false)} className="text-gray-400"><Icon.X size={22} /></button>
                </div>
                {/* Category filter */}
                <div className="flex gap-2 overflow-x-auto px-4 py-2 flex-shrink-0">
                  {['Alle', ...LIBRARY_CATEGORIES].map((cat) => (
                    <button key={cat} onClick={() => setLibraryFilter(cat)}
                      className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition ${libraryFilter === cat ? 'bg-emerald-100 border-emerald-400 text-emerald-900' : 'bg-gray-50 border-gray-200 text-gray-600'}`}>
                      {cat}
                    </button>
                  ))}
                </div>
                {/* Exercise list */}
                <div className="overflow-y-auto flex-1 px-4 pb-4">
                  <div className="space-y-1.5 mt-2">
                    {filteredLib.map((ex) => {
                      const alreadyAdded = days[activeDayIdx].exercises.some((e) => e.name === ex.name);
                      return (
                        <button key={ex.name} onClick={() => { if (!alreadyAdded) addExFromLibrary(ex); }}
                          className={`w-full text-left p-3 rounded-xl border flex items-center gap-3 transition ${alreadyAdded ? 'bg-gray-50 border-gray-100 opacity-40' : 'bg-white border-gray-200 active:bg-emerald-50 active:border-emerald-300'}`}>
                          <div className="flex-1 min-w-0">
                            <div className="font-medium text-gray-900 text-sm">{ex.name}</div>
                            <div className="text-[10px] text-gray-500">{ex.focus} · {ex.sets}×{ex.repRange[0]}–{ex.repRange[1]}</div>
                          </div>
                          <div className="flex-shrink-0">
                            {alreadyAdded
                              ? <Icon.Check size={16} className="text-emerald-600" />
                              : <Icon.Plus size={16} className="text-gray-400" strokeWidth={3} />}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Confirm delete */}
          {confirmDelete && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center px-5 z-50">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full">
                <Icon.AlertTriangle size={32} className="text-red-400 mx-auto" />
                <div className="font-display text-2xl text-center mt-3">PLAN LÖSCHEN?</div>
                <div className="text-sm text-gray-500 text-center mt-2">Der Plan wird unwiderruflich gelöscht. Deine Trainingshistorie bleibt erhalten.</div>
                <div className="mt-5 flex gap-2">
                  <button onClick={() => setConfirmDelete(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-900 font-medium">Abbrechen</button>
                  <button onClick={() => onDelete(planKey)} className="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold">Löschen</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========================================================================
    // CLOUD SYNC SECTION (inside Settings)
    // ========================================================================
    const CloudSyncSection = ({ syncConfig, updateSyncConfig, syncStatus, appState }) => {
      const isConfigured = !!(syncConfig?.url && syncConfig?.anonKey && syncConfig?.userId);
      const [editing, setEditing] = useState(!isConfigured);
      const [url, setUrl] = useState(syncConfig?.url || '');
      const [anonKey, setAnonKey] = useState(syncConfig?.anonKey || '');
      const [userId, setUserId] = useState(syncConfig?.userId || '');
      const [testing, setTesting] = useState(false);
      const [testResult, setTestResult] = useState(null); // null | { ok, msg }
      const [pulling, setPulling] = useState(false);

      const handleTest = async () => {
        setTesting(true);
        setTestResult(null);
        const result = await testSupabaseConnection(url.trim(), anonKey.trim(), userId.trim());
        setTestResult(result);
        setTesting(false);
      };

      const handleSave = async () => {
        setTesting(true);
        const result = await testSupabaseConnection(url.trim(), anonKey.trim(), userId.trim());
        setTesting(false);
        if (!result.ok) { setTestResult(result); return; }
        updateSyncConfig({ url: url.trim(), anonKey: anonKey.trim(), userId: userId.trim() });
        // Push current local state immediately
        pushToSupabase({ url: url.trim(), anonKey: anonKey.trim(), userId: userId.trim() }, appState);
        setEditing(false);
        setTestResult(null);
      };

      const handleDisconnect = () => {
        updateSyncConfig(null);
        resetSupabaseClient();
        setEditing(true);
        setTestResult(null);
      };

      const handlePullNow = async () => {
        setPulling(true);
        try {
          const remote = await pullFromSupabase(syncConfig);
          if (remote?.data) {
            saveState(remote.data);
            window.location.reload();
          } else {
            alert('Keine Daten auf dem Server gefunden.');
          }
        } catch { alert('Verbindungsfehler.'); }
        setPulling(false);
      };

      if (isConfigured && !editing) {
        return (
          <div className="rounded-2xl bg-gray-50 border border-gray-200 p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${syncStatus === 'error' ? 'bg-red-400' : syncStatus === 'syncing' ? 'bg-amber-400' : 'bg-emerald-500'}`} />
                <div className="text-sm font-semibold text-gray-900">Verbunden</div>
              </div>
              <button onClick={() => setEditing(true)} className="text-xs text-gray-500 hover:text-gray-800">
                <Icon.Edit3 size={14} />
              </button>
            </div>
            <div className="text-xs text-gray-500 mb-1">Benutzer-ID: <span className="font-mono-num text-gray-800 font-medium">{syncConfig.userId}</span></div>
            <div className="text-xs text-gray-500 mb-3">Projekt: <span className="font-mono-num text-gray-700">{syncConfig.url.replace('https://', '').slice(0, 30)}…</span></div>
            <div className="flex gap-2">
              <button onClick={handlePullNow} disabled={pulling}
                className="flex-1 py-2 rounded-xl bg-white border border-gray-200 text-gray-700 text-xs font-medium flex items-center justify-center gap-1">
                {pulling ? '⟳ Lade…' : '↓ Jetzt laden'}
              </button>
              <button onClick={handleDisconnect}
                className="py-2 px-3 rounded-xl bg-white border border-red-200 text-red-500 text-xs font-medium">
                Trennen
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-3">
          {isConfigured && (
            <button onClick={() => setEditing(false)} className="text-xs text-gray-500 hover:text-gray-800 flex items-center gap-1">
              <Icon.ChevronLeft size={12} /> Zurück
            </button>
          )}
          <div className="text-[11px] text-gray-500 bg-gray-50 rounded-xl p-3 leading-relaxed">
            Benötigst du einen Supabase-Account? Schritt-für-Schritt-Anleitung findest du am Ende dieser Sektion.
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Supabase Project URL</label>
            <input type="url" value={url} onChange={(e) => setUrl(e.target.value)}
              placeholder="https://xxxx.supabase.co"
              className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none text-sm font-mono-num" />
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Anon Key</label>
            <input type="password" value={anonKey} onChange={(e) => setAnonKey(e.target.value)}
              placeholder="eyJ…"
              className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none text-sm font-mono-num" />
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-wider text-gray-500 block mb-1">Benutzer-ID (frei wählbar)</label>
            <input type="text" value={userId} onChange={(e) => setUserId(e.target.value)}
              placeholder="z.B. max_gym oder deine E-Mail"
              className="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-xl px-3 py-2.5 text-gray-900 outline-none text-sm" />
            <div className="text-[10px] text-gray-400 mt-1">Gleiche ID auf allen Geräten eingeben um Daten zu teilen.</div>
          </div>
          {testResult && (
            <div className={`text-xs rounded-xl p-3 ${testResult.ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-600 border border-red-200'}`}>
              {testResult.ok ? '✓ Verbindung erfolgreich' : `✗ Fehler: ${testResult.msg}`}
